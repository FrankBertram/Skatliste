async function saveSerieToFirestore() {
  if (!window.__firestore) {
    console.warn("Firestore noch nicht initialisiert");
    return;
  }

  // Prüfen, ob alle Spieler einen echten Namen haben
  for (let i = 0; i < spielerAnzahl; i++) {
    if (!spielerNamen[i] || spielerNamen[i] === `Spieler ${i+1}`) {
      alert(`⚠️ Bitte erst alle Spielernamen auswählen (Spieler ${i+1} fehlt)!`);
      return;
    }
  }

  // Prüfen, ob die ausgewählte Spielanzahl erreicht ist
  const gewaehlteSpielAnz = parseInt(document.querySelector('input[name="karten"]:checked')?.value) || 0;
  const eingetragen = spielDaten.slice(0, gewaehlteSpielAnz).filter(s => s.grundwert).length;
  if (gewaehlteSpielAnz > 0 && eingetragen < gewaehlteSpielAnz) {
    alert(`⚠️ Speichern erst möglich, wenn alle ${gewaehlteSpielAnz} Spiele eingetragen sind (aktuell ${eingetragen}).`);
    return;
  }

  const datum = new Date().toISOString().split('T')[0];
  const serie = document.querySelector('input[name="serie"]:checked')?.value || '1';
  const tisch = document.getElementById('tisch-auswahl')?.value || '1';

  const docId = `${datum}_S${serie}_T${tisch}_${spielerAnzahl}er`;

  const spieler = [];
  for (let i = 0; i < spielerAnzahl; i++) {
    const gesamtCell = document.getElementById(`gesamt-p${i+1}`);
    spieler.push({
      name: spielerNamen[i],
      gesamtpunkte: parseInt(gesamtCell?.textContent) || 0
    });
  }

  try {
    const { db, doc, setDoc, getDoc } = window.__firestore;
    const docRef = doc(db, "spieltage", docId);

    // Kollisionsprüfung: existiert bereits ein Eintrag?
    const vorhanden = await getDoc(docRef);
    if (vorhanden.exists()) {
      const altSpielerArr = vorhanden.data().spieler || [];
      const altNamen = altSpielerArr.map(s => s.name);
      const neuNamen = spieler.map(s => s.name);
      const gleicheSpieler = altNamen.length === neuNamen.length &&
        altNamen.every(n => neuNamen.includes(n));

      if (!gleicheSpieler) {
        // Andere Spieler — vermutlich falscher Tisch
        const weiter = confirm(
          `⚠️ Achtung: Für Tisch ${tisch}, Serie ${serie} am ${datum} ist bereits ein Eintrag vorhanden mit anderen Spielern:\n\n` +
          `Vorhandener Eintrag:\n  ${altNamen.join(', ')}\n\n` +
          `Aktueller Eintrag:\n  ${neuNamen.join(', ')}\n\n` +
          `Wurde vielleicht der falsche Tisch gewählt?\n\n` +
          `Trotzdem überschreiben?`
        );
        if (!weiter) return;
      } else {
        // Gleiche Spieler — prüfen, ob Punkte abweichen (evtl. falsche Serie gewählt)
        const punkteGleich = altSpielerArr.every(alt => {
          const neu = spieler.find(s => s.name === alt.name);
          return neu && Number(neu.gesamtpunkte) === Number(alt.gesamtpunkte);
        });
        if (!punkteGleich) {
          const altPunkte = altSpielerArr.map(s => `  ${s.name}: ${s.gesamtpunkte}`).join('\n');
          const neuPunkte = spieler.map(s => `  ${s.name}: ${s.gesamtpunkte}`).join('\n');
          const weiter = confirm(
            `⚠️ Achtung: Für Tisch ${tisch}, Serie ${serie} am ${datum} ist bereits ein Eintrag mit abweichenden Gesamtpunkten vorhanden:\n\n` +
            `Vorhandener Eintrag:\n${altPunkte}\n\n` +
            `Aktueller Eintrag:\n${neuPunkte}\n\n` +
            `Wurde vielleicht die falsche Serie gewählt?\n\n` +
            `Trotzdem überschreiben?`
          );
          if (!weiter) return;
        }
      }
    }

    await setDoc(docRef, {
      datum, serie, tisch, spielerAnzahl, spieler,
      gespeichertAm: new Date().toISOString()
    });
    alert("✅ Serie in Firebase gespeichert!");
  } catch (e) {
    console.error("Firestore-Fehler:", e);
    if (e.code === "permission-denied" || /permission/i.test(e.message)) {
      alert("❌ Speichern nur am Clubabend möglich.");
    } else {
      alert("❌ Speichern in Firebase fehlgeschlagen: " + e.message);
    }
  }
}

function saveGame(gewonnen) {
    const form = document.getElementById("spiel-form");
    const index = parseInt(form.dataset.spielIndex, 10);
    const neuerSpieler = parseInt(form.dataset.ausgewaehlterSpieler, 10);
    const n = spielerAnzahl;

    if (isNaN(index)) {
        alert("Kein gültiges Spiel ausgewählt.");
        return;
    }

	const grundwertInput = document.getElementById("grundwert");
	const grundwert = grundwertInput ? grundwertInput.value.trim() : form.dataset.grundwert || "E";
	if (!grundwert) {
		alert("Bitte Spielart (Grand,♣,♠,♥,♦,Null oder Eingepasst) auswählen.");
		return;
	}

    const istPass = (grundwert === "E" || grundwert === "Pass");

    let spielerGueltig = !isNaN(neuerSpieler) && neuerSpieler >= 1 && neuerSpieler <= n;
    if (!spielerGueltig && !istPass) {
        alert("Bitte einen Spieler auswählen (außer bei Pass).");
        return;
    }

    const spiel = spielDaten[index];

    if (spiel.offen === "X" && grundwert!="23" &&
    	(spiel.hand === "" || spiel.schneider === ""  || spiel.schneiderang === "" || spiel.schwarz === ""  || spiel.schwarzang === "")) {
        alert("❌ Ouvert nur bei Hand + Schneider + Schneider Ang. + Schwarz + Schwarz Ang. möglich!");
        return;
    }
    if (spiel.schwarzang === "X" &&
    	(spiel.hand === "" || spiel.schneider === ""  || spiel.schneiderang === "" || spiel.schwarz === "")) {
        alert("❌ Schwarz angesagt nur bei Hand + Schneider + Schneider Ang. + Schwarz möglich!");
        return;
    }
    if (spiel.schwarz === "X" && spiel.schneider === "") {
        alert("❌ Schwarz nur bei Schneider möglich!");
        return;
    }
    if (spiel.schneiderang === "X" && (spiel.hand === "" || spiel.schneider === "")) {
        alert("❌ Schneider angesagt nur bei Hand + Schneider möglich!");
        return;
    }

    const alterSpielerVorher = spiel.spieler;
    const warGewonnen        = spiel.gewonnen;

    spiel.grundwert     = grundwert;
    spiel.spieler       = istPass ? null : neuerSpieler;
    spiel.gewonnen      = istPass ? null : gewonnen;

    const mitInput  = document.getElementById("mitSpitzen");
    const ohneInput = document.getElementById("ohneSpitzen");

    let mit  = mitInput  ? parseInt(mitInput.value)  || 0 : 0;
    let ohne = ohneInput ? parseInt(ohneInput.value) || 0 : 0;

    if (mit > 0 && ohne > 0) {
        const toggles = document.querySelectorAll("#spitzen-buttons button");
        const istMit = toggles[0]?.classList.contains("active");
        if (istMit) { ohne = 0; if (ohneInput) ohneInput.value = ""; }
        else        { mit  = 0; if (mitInput)  mitInput.value  = ""; }
    }

    if (mit === 0 && ohne === 0) {
        mit = 1;
        ohne = 0;
        if (mitInput)  mitInput.value  = "1";
        if (ohneInput) ohneInput.value = "";
        setSpitzen(true);
    }

    spiel.mitSpitzen  = mit;
    spiel.ohneSpitzen = ohne;

    if (spiel.schwarz === "X" && spiel.mitSpitzen === 0) {
        alert("❌ Schwarz ohne Kreuz Bube nicht möglich!");
        return;
    }

    if (istPass) {
        spiel.pluswert  = "";
        spiel.minuswert = "";
        spiel.hand = "";
        spiel.schneider = "";
        spiel.schneiderang = "";
        spiel.schwarz = "";
        spiel.schwarzang = "";
        spiel.offen = "";
        spiel.mitSpitzen = 0;
        fillTable();
        closeSpielDialog();
        return;
    }

    const basisWert = berechneSpielwert(spiel);
    const spielwert = basisWert * (gewonnen ? 1 : 2);
    const deltaNeu  = gewonnen ? spielwert : -spielwert;

    if (alterSpielerVorher && alterSpielerVorher !== neuerSpieler) {
        const altKey = `p${alterSpielerVorher}`;
        spiel[`${altKey}_delta`] = 0;

        if (warGewonnen === true) {
            spiel[`${altKey}_gew`] = Math.max(0, (parseInt(spiel[`${altKey}_gew`]) || 0) - 1);
        } else if (warGewonnen === false) {
            spiel[`${altKey}_verl`] = Math.max(0, (parseInt(spiel[`${altKey}_verl`]) || 0) - 1);
        }
    }

    const neuKey = `p${neuerSpieler}`;
    spiel[`${neuKey}_delta`] = deltaNeu;

    if (gewonnen) {
        spiel[`${neuKey}_gew`]  = (parseInt(spiel[`${neuKey}_gew`])  || 0) + 1;
        spiel[`${neuKey}_verl`] = parseInt(spiel[`${neuKey}_verl`]) || 0;
    } else {
        spiel[`${neuKey}_gew`]  = parseInt(spiel[`${neuKey}_gew`])  || 0;
        spiel[`${neuKey}_verl`] = (parseInt(spiel[`${neuKey}_verl`]) || 0) + 1;
    }

    if (gewonnen) {
        spiel.pluswert  = spielwert;
        spiel.minuswert = "";
    } else {
        spiel.pluswert  = "";
        spiel.minuswert = -spielwert;
    }

    fillTable();
    closeSpielDialog();

    const spielerName = spielerNamen[neuerSpieler - 1] || `Spieler ${neuerSpieler}`;
    showSpielStatus(spielerName, deltaNeu, index + 1);
}

function showSpielStatus(name, delta, spielNr) {
    let el = document.getElementById('spiel-status-popup');
    if (!el) {
        el = document.createElement('div');
        el.id = 'spiel-status-popup';
        // Groesse ~75% des Viewports; %-Werte, damit die html-transform (autoScalePage) korrekt mitskaliert
        el.style.cssText =
            'position:fixed; top:12.5%; left:12.5%; width:75%; height:75%;' +
            'background:#fff; border:3px solid #333; border-radius:24px;' +
            'display:flex; flex-direction:column; justify-content:center; align-items:center; gap:4%;' +
            'font-family:sans-serif; text-align:center;' +
            'box-shadow:0 10px 40px rgba(0,0,0,0.45); z-index:9999;' +
            'pointer-events:none;';
        document.body.appendChild(el);
    }
    const positive = delta >= 0;
    const farbe = positive ? '#2e7d32' : '#c62828';
    const vorzeichen = positive ? '+' : '';
    el.innerHTML =
        `<div style="position:absolute; top:10px; left:16px; font-size:20px; font-weight:bold; color:#333;">` +
        `Ergebnis Spiel: ${spielNr != null ? spielNr : ''}</div>` +
        `<button type="button" id="spiel-status-close" ` +
        `style="position:absolute; top:8px; right:12px; width:44px; height:44px;` +
        ` border:none; background:transparent; font-size:32px; font-weight:bold;` +
        ` color:#555; cursor:pointer; pointer-events:auto; line-height:1;">×</button>` +
        `<div id="status-name" style="font-weight:bold; line-height:1; white-space:nowrap;">${name}</div>` +
        `<div id="status-delta" style="font-weight:bold; line-height:1; color:${farbe};">${vorzeichen}${delta}</div>`;
    el.style.display = 'flex';

    // Groessen dynamisch auf Popup-Dimension anpassen (Tablet quer wie hoch, langer Name)
    requestAnimationFrame(() => {
        const popupW = el.clientWidth;
        const popupH = el.clientHeight;
        const nameEl  = el.querySelector('#status-name');
        const deltaEl = el.querySelector('#status-delta');
        if (!nameEl || !deltaEl) return;

        // Delta (Zahl): 30% der Hoehe, aber max. 25% der Breite
        const deltaSize = Math.min(popupH * 0.30, popupW * 0.25);
        deltaEl.style.fontSize = deltaSize + 'px';

        // Name: Startgroesse 18% der Hoehe bzw. 20% der Breite; dann verkleinern,
        // bis er in 92% der Popupbreite passt
        let nameSize = Math.min(popupH * 0.18, popupW * 0.20);
        nameEl.style.fontSize = nameSize + 'px';
        const maxNameWidth = popupW * 0.92;
        let guard = 60;
        while (nameEl.scrollWidth > maxNameWidth && nameSize > 12 && guard-- > 0) {
            nameSize -= 2;
            nameEl.style.fontSize = nameSize + 'px';
        }
    });

    clearTimeout(el._hideTimer);
    el._hideTimer = setTimeout(() => { el.style.display = 'none'; }, 5000);
    const closeBtn = document.getElementById('spiel-status-close');
    if (closeBtn) closeBtn.addEventListener('click', () => {
        clearTimeout(el._hideTimer);
        el.style.display = 'none';
    });
}

// ── Speicher-Abstraktion (localStorage → IndexedDB Fallback) ──────
const STORE_KEY = 'skatSpielstand';
let _db = null;

function _storageOK() {
  try {
    localStorage.setItem('_test', '1');
    localStorage.removeItem('_test');
    return true;
  } catch (e) {
    return false;
  }
}

function _openDB() {
  return new Promise((resolve, reject) => {
    if (_db) { resolve(_db); return; }
    const req = indexedDB.open('SkatDB', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('state');
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}

function _idbSet(key, val) {
  return _openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readwrite');
    tx.objectStore('state').put(val, key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  }));
}

function _idbGet(key) {
  return _openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readonly');
    const req = tx.objectStore('state').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  }));
}

function _idbDel(key) {
  return _openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readwrite');
    tx.objectStore('state').delete(key);
    tx.oncomplete = resolve;
    tx.onerror = () => reject(tx.error);
  }));
}

// ── Spielstand speichern / laden ──────────────────────────────────
function _buildState() {
  return {
    spielDaten: spielDaten,
    spielerAnzahl: spielerAnzahl,
    spielerNamen: spielerNamen,
    serie: document.querySelector('input[name="serie"]:checked')?.value || '1',
    tisch: document.getElementById('tisch-auswahl')?.value || '1',
    karten: document.querySelector('input[name="karten"]:checked')?.value
  };
}

function saveState() {
  const json = JSON.stringify(_buildState());
  if (_storageOK()) {
    localStorage.setItem(STORE_KEY, json);
  }
  // Immer auch in IndexedDB speichern (robuster auf iOS)
  _idbSet(STORE_KEY, json).catch(e => console.log('IDB save:', e));
}

function _applyState(state) {
  spielerAnzahl = state.spielerAnzahl || 4;
  const saRadio = document.querySelector(`input[name="spieleranzahl"][value="${spielerAnzahl}"]`);
  if (saRadio) saRadio.checked = true;

  if (state.spielerNamen) {
    for (let i = 0; i < state.spielerNamen.length; i++) {
      spielerNamen[i] = state.spielerNamen[i];
    }
  }

  // Spieldaten VOR updateKartenAuswahl wiederherstellen,
  // damit resizeSpielDaten/fillTable/saveState die Daten nicht überschreibt
  if (state.spielDaten && state.spielDaten.length > 0) {
    spielDaten = state.spielDaten;
  }

  const serieRadio = document.querySelector(`input[name="serie"][value="${state.serie}"]`);
  if (serieRadio) serieRadio.checked = true;
  const tischSelect = document.getElementById('tisch-auswahl');
  if (tischSelect && state.tisch) tischSelect.value = state.tisch;

  updateKartenAuswahl();
  if (state.karten) {
    const kartenRadio = document.querySelector(`input[name="karten"][value="${state.karten}"]`);
    if (kartenRadio) kartenRadio.checked = true;
  }
}

function loadState() {
  return new Promise(resolve => {
    // 1. Versuch: localStorage
    if (_storageOK()) {
      const json = localStorage.getItem(STORE_KEY);
      if (json) {
        try {
          _applyState(JSON.parse(json));
          resolve(true);
          return;
        } catch (e) { /* weiter zu IDB */ }
      }
    }
    // 2. Versuch: IndexedDB (Fallback für iOS file://)
    _idbGet(STORE_KEY).then(json => {
      if (json) {
        try {
          _applyState(JSON.parse(json));
          resolve(true);
          return;
        } catch (e) { /* leer starten */ }
      }
      resolve(false);
    }).catch(() => resolve(false));
  });
}

function clearState() {
  if (_storageOK()) localStorage.removeItem(STORE_KEY);
  _idbDel(STORE_KEY).catch(() => {});
}

// Kurzlabels für Tabellenkopf im Handy-Querformat (PDF nutzt die Vollversion).
const _HEADER_LABEL_MAP = {
  'Lfd. Nr. Spiel': 'Nr',
  'Hand':           'Hd',
  'Schneider':      'Sn',
  'Schn. ang.':     '-A',
  'Schwarz':        'Sw',
  'Schw. ang.':     '-A',
  'Offen':          'Of',
  'Eingepasst':     'E.',
  'gewonnen':       'G',
  'verloren':       'V',
};
function _setHeaderLabels(compact) {
  // Vertikale Spans
  document.querySelectorAll('#skat-table thead th.vertical-left > span').forEach(span => {
    if (!span.dataset.full) span.dataset.full = span.textContent.trim();
    const full = span.dataset.full;
    span.textContent = compact ? (_HEADER_LABEL_MAP[full] || full) : full;
  });
  // Grundwert-Zahlenspalte (9/10/11/12/23/24/E) → "SW"
  const untenTh = document.querySelector('#skat-table thead tr:first-child th.unten');
  if (untenTh) {
    if (!untenTh.dataset.full) untenTh.dataset.full = untenTh.innerHTML;
    untenTh.innerHTML = compact ? 'SW' : untenTh.dataset.full;
  }
  // "Werte"-Zelle (colspan=2) bleibt auf Handy und Desktop gleich benannt
  // (Original wird bereits in buildTableStructure als "Werte" ausgegeben).
  document.body.classList.toggle('mobile-compact-header', compact);
  // Spielernamen ohne (LF) im Kompaktmodus
  if (typeof updatePlayerNamesInTable === 'function') updatePlayerNamesInTable();
}

// Strukturelle Änderung: "mit Spitzen"/"ohne Spitzen" (2 Zellen mit rowspan=2)
// zu einer "Buben"-Zelle (colspan=2) und darunter "+"/"-" in row2 verwandeln.
function _setHeaderStructure(compact) {
  const thead = document.getElementById('skat-thead');
  if (!thead) return;
  const isCompactNow = thead.classList.contains('is-compact-structure');
  if (compact && !isCompactNow) {
    const row1 = thead.querySelector('tr:first-child');
    const row2 = thead.querySelector('tr:nth-child(2)');
    if (!row1 || !row2) return;
    // Index 2 = "mit Spitzen", Index 3 = "ohne Spitzen" (nach "Nr" und "SW")
    const mitCell  = row1.children[2];
    const ohneCell = row1.children[3];
    if (mitCell && ohneCell) {
      mitCell.rowSpan = 1;
      mitCell.colSpan = 2;
      mitCell.classList.remove('vertical-left');
      mitCell.classList.add('buben-header');
      mitCell.innerHTML = 'Buben';
      ohneCell.remove();
      // In row2 am Anfang "+" und "-" einfügen
      const plusTh  = document.createElement('th');
      plusTh.className  = 'buben-sub';
      plusTh.textContent = '+';
      const minusTh = document.createElement('th');
      minusTh.className = 'buben-sub';
      minusTh.textContent = '−';
      row2.insertBefore(minusTh, row2.firstChild);
      row2.insertBefore(plusTh,  row2.firstChild);
    }
    thead.classList.add('is-compact-structure');
  } else if (!compact && isCompactNow) {
    // Rückumbau: Buben-Zelle in "mit Spitzen"/"ohne Spitzen" zurückverwandeln
    const row1 = thead.querySelector('tr:first-child');
    const row2 = thead.querySelector('tr:nth-child(2)');
    if (!row1 || !row2) return;
    const bubenCell = row1.querySelector('th.buben-header');
    if (bubenCell) {
      bubenCell.rowSpan = 2;
      bubenCell.colSpan = 1;
      bubenCell.classList.add('vertical-left');
      bubenCell.classList.remove('buben-header');
      bubenCell.innerHTML = '<span>mit Spitzen</span>';
      const ohneCell = document.createElement('th');
      ohneCell.rowSpan = 2;
      ohneCell.className = 'vertical-left';
      ohneCell.innerHTML = '<span>ohne Spitzen</span>';
      bubenCell.parentNode.insertBefore(ohneCell, bubenCell.nextSibling);
    }
    row2.querySelectorAll('th.buben-sub').forEach(th => th.remove());
    thead.classList.remove('is-compact-structure');
  }
}

function _updateHeaderLabels() {
  const compact = window.matchMedia('(max-height: 500px) and (orientation: landscape)').matches;
  _setHeaderStructure(compact);
  _setHeaderLabels(compact);
}

function applyMobileLayout() {

  const mobileHdr = document.querySelector('.header-mobile');
  const zeile2    = document.getElementById('spieler-buttons-container');

    'player-btn-container-1',

    'player-btn-container-3',
    'player-btn-container-4',
    'csv-export-container',
    'pdf-export-container',
    'neu-start-container',
  ];

  if (isPhoneL) {
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el && el.parentNode !== mobileHdr) mobileHdr.insertBefore(el, info);
    });
  } else {
    ids.forEach(id => {
      const el = document.getElementById(id);

    buildTableStructure();   // muss VOR updateKartenAuswahl/fillTable laufen
    if (!loaded) {
      updateKartenAuswahl(); // jetzt sind sum-p1/gew-p1/... bereits im DOM
    }
    fillTable();
    generatePlayerNameButtons();
    createCSVButton();
    createPDFButton();
    createNeuStartButton();
    updateCopyright();
    updateHeaderInfo();
    applyMobileLayout();
    console.log(screen.width + 'x' + screen.height);

    // An Sondertagen: Turnierauslosung für aktuelle Serie/Tisch laden und Namen setzen
    refreshTurnierauslosung();

    // Bei neuer Liste im Handy-Querformat: Start-Dialog zeigen
    if (!loaded && isPhoneLandscape()) {
      openStartDialog();
    }
  });
});
