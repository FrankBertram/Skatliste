<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="icon" type="image/png" href="Skat.png">
  <link rel="apple-touch-icon" href="Skat.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script>

  <script type="module">

    const firebaseConfig = {
      apiKey: "AIzaSyDmiQvDu0pxQYoidaZfRVY0BXZjLOHhw7w",
      authDomain: "skatverein-b77ef.firebaseapp.com",
      projectId: "skatverein-b77ef",
      storageBucket: "skatverein-b77ef.firebasestorage.app",

  <!-- PDF-Export: html2canvas + jsPDF -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;  /* Offline-fähig, kein Google Fonts nötig */
      font-size: 14px;  /* Etwas größer für Touch (13px → 14px) */
      margin: 15px;
      touch-action: manipulation;  /* Doppel-Tipp-Zoom deaktivieren */
    }
    .header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .header span { font-weight: bold; }

    table {
      border-collapse: collapse;
      width: 780px;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #444;
      padding: 3px 4px;
      text-align: center;
      vertical-align: middle;
    }
    th {
      background-color: #eee;
      font-size: 13px;
      line-height: 1.1;
    }
	.header label {
	  cursor: pointer;
	  margin-right: 10px;
	  font-size: 10px;
	}

	.header input[type="radio"] {
	  margin-right: 4px;
	}

    .player-name {
      width: 90px;
      text-align: left;
      padding-left: 6px;
    }
	.rechts {
	  text-align: right !important;
	}

.neuer-eintrag-btn {
  background: #FFF9C4 !important;
  color: #000 !important;
  border: 2px solid #F57F17 !important;
  padding: 6px 16px;
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
}

.neuer-eintrag-btn:hover {
  background: #FFF176 !important;
  transform: scale(1.05);
  box-shadow: 0 4px 8px rgba(245,127,23,0.3);
}

.neuer-eintrag-btn:active {
  transform: translateY(0); box-shadow: 0 2px 4px rgba(76,175,80,0.3);
}

.radio-group {
  display: flex;
  gap: 3px;
  border: 1px solid #888;
  border-radius: 4px;
  padding: 2px 4px;
  background: #f5f5f5;
  box-sizing: border-box;
  flex-wrap: wrap;
  max-width: 200px;
}

.radio-label {
  white-space: nowrap;
  gap: 2px;
  font-size: 16px;
}
.radio-group-compact {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 0px;
  padding: 1px 2px;
  border: 1px solid #888;
  border-radius: 4px;
  background: #f5f5f5;
  max-width: 300px;
  align-items: center;
  height: 34px;
}

.radio-group-compact .radio-label {
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  padding: 0px 3px;
  height: 100%;
}

.radio-label input[type="radio"] {
  margin: 0 4px 0 0;
  height: 14px;
  width: 14px;
  vertical-align: middle;
}

.radio-label:hover {
  background: #e8e8e8;
}

    .gew-verl {
      font-size: 9px;
      line-height: 1;
    }

    .edit-btn {
      font-size: 10px;
      padding: 1px 1px;
      cursor: pointer;
      background: orange;
      color: white;
      border: 1px solid #888;
    }
    .spitzen-btn {
      padding: 12px 20px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #888;
      cursor: pointer;
      background: #f5f5f5;
      min-width: 200px;
    }

    .spitzen-btn.active {
      background: #2196F3;
      color: white;
      font-weight: bold;
    }

    .spielwert-spalte {
	  min-width: 30px;
	  width: 30px;
	  text-align: right;
	}

    .spitze-btn {
      padding: 8px 14px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #888;
      background: #f5f5f5;
      cursor: pointer;
      min-width: 50px;
    }

    .spitze-btn.active {
      background: #2196F3;
      color: white;
      font-weight: bold;
    }

    .gw-btn {
      display: inline-block;
      margin-right: 5px;
      font-size: 15px;
      padding: 2px 10px;
      cursor: pointer;
      border-radius: 6px;
      height: 80px;
      min-width: 95px;
      box-sizing: border-box;
      border: 1px solid #888;
      background-color: #fff;
      color: #000;
      font-weight: normal;
      line-height: normal;
      width: auto;
      overflow: hidden;
    }

    .gw-btn.active {
      background: #4CAF50;
      color: #fff;
      font-weight: bold;
    }

    .result-row td {
      background-color: #f8f8f8;
      font-weight: bold;
    }
    .money-row {
      display: flex;
      gap: 20px;
      justify-content: flex-start;
      margin: 8px 0;
    }
    .money-row input {
      width: 90px;
      text-align: right;
    }
    .signature {
      margin-top: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .vertical {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      white-space: nowrap;
    }

	.vertical-left {
	  vertical-align: bottom;
	  text-align: left !important;
	}

	.vertical-left span {
	  writing-mode: vertical-lr;
	  -webkit-writing-mode: vertical-lr;
	  text-orientation: mixed;
	  -webkit-text-orientation: mixed;
	  display: inline-block;
	  white-space: nowrap;
	}

	/* Mindestbreite für die schmalen Spalten:
	   mit Spitzen, ohne Spitzen, Hand, Schneider, Schn.ang, Schwarz, Schw.ang, Offen */
	#skat-table tbody td:nth-child(n+3):nth-child(-n+10),
	#skat-table thead tr:nth-child(2) th:nth-child(-n+6),
	#skat-table thead tr:nth-child(1) th:nth-child(3),
	#skat-table thead tr:nth-child(1) th:nth-child(4) {
	  min-width: 14px;
	}

.unten {
  vertical-align: bottom !important;
  text-align: center;
  padding-bottom: 2px;
}

    input[type="text"] {
      border: none;
      border-bottom: 1px solid #333;
      background: transparent;
    }

    #skat-table thead th {
      position: -webkit-sticky;
      position: sticky;
      background: #f0f0f0;
      border-bottom: 2px solid #ccc;
      text-align: center;
	  font-size: 11px;
	  font-weight: 400;
	  color: black;
      padding: 4px 6px;
      z-index: 2;
    }

    #skat-table thead tr:nth-child(1) th {
      top: 1px;
      z-index: 3;
    }

    #skat-table thead tr:nth-child(2) th {
      top: 35px;
      z-index: 2;
    }

    #skat-table tfoot {
      position: static;
      bottom: auto;
      z-index: auto;
    }

    #skat-table tfoot td {
      background: #f0f0f0;
      border-top: 2px solid #ccc;
      padding: 4px 6px;
      text-align: center;
    }

    /* Handy-Header-Kompaktmodus: vertikale Beschriftungen horizontal darstellen.
       Wird per body-Klasse "mobile-compact-header" geschaltet, damit der PDF-Export
       diese Regeln durch Entfernen der Klasse temporär umgehen kann. */
    body.mobile-compact-header #skat-table thead th.vertical-left {
      text-align: center !important;
      vertical-align: middle !important;
      padding: 3px 2px !important;
    }
    body.mobile-compact-header #skat-table thead th.vertical-left > span {
      writing-mode: horizontal-tb !important;
      -webkit-writing-mode: horizontal-tb !important;
      text-orientation: mixed !important;
      display: inline !important;
      font-size: 12px !important;
      font-weight: bold !important;
      white-space: nowrap !important;
    }
    body.mobile-compact-header #skat-table thead th.unten {
      vertical-align: middle !important;
      font-weight: bold !important;
      font-size: 12px !important;
    }
    /* Spielernamen im Header fett */
    body.mobile-compact-header #skat-table thead th.player-name {
      font-weight: bold !important;
      font-size: 12px !important;
      padding: 3px 2px !important;
    }
    /* Buben-Verbindungszelle und "+/−" darunter */
    body.mobile-compact-header #skat-table thead th.buben-header {
      text-align: center !important;
      vertical-align: middle !important;
      font-weight: bold !important;
      font-size: 12px !important;
    }
    body.mobile-compact-header #skat-table thead th.buben-sub {
      text-align: center !important;
      vertical-align: middle !important;
      font-weight: bold !important;
      font-size: 12px !important;
      padding: 2px !important;
    }
    /* Datenzellen enger, damit die Tabelle in die Handybreite passt */
    body.mobile-compact-header #skat-table th,
    body.mobile-compact-header #skat-table td {
      padding: 1px 2px !important;
    }
    /* Header komplett fett im Kompaktmodus (Buben, Werte, Hd/Sn/-A/Sw/-A/Of, +/-, Namen, E.) */
    body.mobile-compact-header #skat-table thead th {
      font-weight: bold !important;
      position: static !important;
      top: auto !important;
    }

    /* Spielliste: schmalere Body-Margins im Handy-Querformat,
       damit die Tabelle die komplette Breite nutzen kann.
       Padding berücksichtigt Notch/Statusbar/Home-Indicator (iPhone). */
    @media (max-height: 500px) and (orientation: landscape) {
      body {
        margin: 0 !important;
        padding-top:    max(env(safe-area-inset-top),    8px) !important;
        padding-left:   max(env(safe-area-inset-left),   4px) !important;
        padding-right:  max(env(safe-area-inset-right),  4px) !important;
        padding-bottom: max(env(safe-area-inset-bottom), 2px) !important;
      }
      #zoom-reset-btn {
        display: block !important;
        top: max(env(safe-area-inset-top), 6px) !important;
        right: max(env(safe-area-inset-right), 6px) !important;
      }
      /* Tabellen-Natural-Width kleiner ansetzen, damit alles in die
         iPhone-Querformat-Breite passt (Skalierung greift trotzdem). */
      #skat-table { min-width: 800px; }
      /* kein horizontales Scrollen erlauben */
      .table-wrapper { overflow-x: hidden !important; }
      /* Tabellen-Zellen: 1 px kleiner + fett (Kopf bleibt wie vorher) */
      #skat-table tbody td,
      #skat-table tfoot td,
      #skat-table tfoot th {
        font-size: 15px !important;
        font-weight: bold !important;
      }
      /* Desktop-Header ausblenden, Mobile-Header einblenden */
      .header .header-desktop { display: none !important; }
      .header .header-mobile  { display: flex !important; }
      .header { gap: 6px !important; margin-bottom: 4px !important; align-items: center; flex-wrap: nowrap; }
      #club-logo { height: 30px !important; }
      #header-info { font-size: 12px !important; }
      /* Zweite Zeile komplett ausblenden — Inhalte wurden per JS in den Header verschoben */
      #spieler-buttons-container { display: none !important; }
      /* Spielernamen-Buttons: kompakter, aber Schriftart wie im Standard-Layout */
      .header-mobile #player-btn-container-1 button,
      .header-mobile #player-btn-container-2 button,
      .header-mobile #player-btn-container-3 button,
      .header-mobile #player-btn-container-4 button {
        min-width: 0 !important;
        padding: 6px 6px !important;
        font-size: 14px !important;
      }
      /* PDF-, Neue-Liste-, Speichern-Buttons: farbig mit weißer, fetter Schrift */
      .header-mobile #pdf-export-container button,
      .header-mobile #neu-start-container button,
      .header-mobile #csv-export-container button {
        min-width: 0 !important;
        padding: 8px 6px !important;
        font-size: 14px !important;
        font-weight: bold !important;
        color: #fff !important;
      }
    }

    /* Handy-Hochformat: Liste ausblenden, Hinweis anzeigen */
    @media (max-width: 500px) and (orientation: portrait) {
      body > *:not(#portrait-warning) { display: none !important; }
      #portrait-warning { display: flex !important; }
    }

    /* Kompaktes Dialog-Layout für Handy-Querformat */
    @media (max-height: 500px) and (orientation: landscape) {
      #spiel-dialog {
        width: 100vw !important;
        max-width: 100vw !important;
        padding: 6px !important;
        margin: 0 !important;
        max-height: 100vh;
        overflow-y: auto;
        font-size: 12px !important;
        box-sizing: border-box;
      }
      #spiel-dialog form { gap: 4px !important; }
      #spiel-dialog h3 { font-size: 14px !important; }

      /* Immer sichtbare Reihen: volle Breite */
      #spiel-dialog #player-buttons,
      #spiel-dialog #grundwert-buttons,
      #spiel-dialog #gewinnstufen-buttons {
        display: flex !important;
        flex-wrap: nowrap !important;
        gap: 4px !important;
        width: 100% !important;
        margin: 0 !important;
      }
      /* Spitzen-Reihen: NICHT display erzwingen — JS steuert ein/aus */
      #spiel-dialog #spitzen-buttons,
      #spiel-dialog #spitzen-anzahl {
        flex-wrap: nowrap !important;
        gap: 4px !important;
        width: 100% !important;
        margin: 0 !important;
      }
      #spiel-dialog #player-buttons > *,
      #spiel-dialog #grundwert-buttons > button,
      #spiel-dialog #spitzen-buttons > button,
      #spiel-dialog #spitzen-anzahl > *,
      #spiel-dialog #gewinnstufen-buttons > button {
        flex: 1 1 0 !important;
        min-width: 0 !important;
        padding: 0 !important;
        box-sizing: border-box !important;
      }

      /* Alle Buttonreihen gleiche Höhe */
      #spiel-dialog #player-buttons,
      #spiel-dialog #gewinnstufen-buttons,
      #spiel-dialog #grundwert-buttons,
      #spiel-dialog #spitzen-buttons,
      #spiel-dialog #spitzen-anzahl {
        height: 50px !important;
        min-height: 50px !important;
      }
      #spiel-dialog #player-buttons > *,
      #spiel-dialog #gewinnstufen-buttons > button,
      #spiel-dialog #grundwert-buttons > button,
      #spiel-dialog #spitzen-buttons > button,
      #spiel-dialog #spitzen-anzahl > * {
        height: 50px !important;
        font-size: 14px !important;
      }
      #spiel-dialog #grundwert-buttons button:nth-child(n+2):nth-child(-n+5) {
        font-size: 32px !important;
      }

      /* Untere Buttonreihe: Gewonnen/Verloren/Eingepasst */
      #spiel-dialog form > div[style*="margin-top:20px"] {
        margin-top: 4px !important;
        gap: 6px !important;
      }
      #spiel-dialog #btn-gewonnen,
      #spiel-dialog #btn-verloren,
      #spiel-dialog #btn-eingepasst {
        flex: 1 1 0 !important;
        min-width: 0 !important;
        padding: 0 !important;
        height: 50px !important;
        font-size: 16px !important;
      }
    }

    /* Sehr kurzer Viewport (z.B. iPhone 8 Querformat ≤ 400px Höhe):
       Reihen und Abstände kompakter, damit alles ohne Scrollen passt */
    @media (max-height: 400px) and (orientation: landscape) {
      #spiel-dialog {
        padding: 3px !important;
        font-size: 11px !important;
      }
      #spiel-dialog form { gap: 2px !important; }
      #spiel-dialog h3 { font-size: 12px !important; }

      #spiel-dialog #player-buttons,
      #spiel-dialog #gewinnstufen-buttons,
      #spiel-dialog #grundwert-buttons,
      #spiel-dialog #spitzen-buttons,
      #spiel-dialog #spitzen-anzahl {
        height: 40px !important;
        min-height: 40px !important;
      }
      #spiel-dialog #player-buttons > *,
      #spiel-dialog #gewinnstufen-buttons > button,
      #spiel-dialog #grundwert-buttons > button,
      #spiel-dialog #spitzen-buttons > button,
      #spiel-dialog #spitzen-anzahl > * {
        height: 40px !important;
        font-size: 12px !important;
      }
      #spiel-dialog #grundwert-buttons button:nth-child(n+2):nth-child(-n+5) {
        font-size: 26px !important;
      }
      #spiel-dialog form > div[style*="margin-top:20px"] {
        margin-top: 2px !important;
        gap: 4px !important;
      }
      #spiel-dialog #btn-gewonnen,
      #spiel-dialog #btn-verloren,
      #spiel-dialog #btn-eingepasst {
        height: 40px !important;
        font-size: 13px !important;
      }
    }

  </style>
</head>
<body>

<div id="portrait-warning" style="display:none; position:fixed; inset:0; background:#fff; z-index:9999;
     align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:20px;">
  <img src="Skat.png" alt="Skat-Logo" style="height:140px; margin-bottom:30px;">
  <div style="font-size:60px; margin-bottom:20px;">📱 ↻</div>
  <div style="font-size:32px; font-weight:bold; line-height:1.3;">Bitte<br>Querformat<br>anwenden</div>
</div>

<button id="zoom-reset-btn" onclick="resetZoom()"
        title="Darstellung zurücksetzen"
        style="display:none; position:fixed; top:6px; right:6px; z-index:9000;
               width:36px; height:36px; border-radius:50%;
               border:1px solid #888; background:#f5f5f5;
               font-size:18px; cursor:pointer; line-height:1;
               box-shadow:0 2px 5px rgba(0,0,0,0.2);">↻</button>

<div class="header">
  <img id="club-logo" src="Skat.png" alt="Skat-Logo" style="height: 40px; flex-shrink:0;">

  <!-- Desktop/Tablet: Verein + Radios in zwei Zeilen -->
  <div class="header-desktop" style="display:flex; flex-direction:column; gap:8px; flex:1 1 auto; min-width:0;">
    <span id="club-name" style="font-size:20px; font-weight:bold;">1. Sintherner Skatclub</span>
    <div style="display:flex; align-items:center; gap:15px; flex-wrap:wrap;">
      <span>Spieler:</span>
      <div class="radio-group radio-group-compact">
        <label class="radio-label"><input type="radio" name="spieleranzahl" value="4" checked>4</label>
        <label class="radio-label"><input type="radio" name="spieleranzahl" value="3">3</label>
      </div>

      <span>Serie:</span>
      <div class="radio-group radio-group-compact">
        <label class="radio-label"><input type="radio" name="serie" value="1" checked>1.</label>
        <label class="radio-label"><input type="radio" name="serie" value="2">2.</label>
      </div>

      <span>Tisch:</span>
      <select id="tisch-auswahl" style="font-size:16px; padding:4px 8px; border-radius:4px; border:1px solid #888; height:34px;">
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
      </select>

      <span>Spiele:</span>
      <div id="karten-auswahl" class="radio-group radio-group-compact">
        <label class="radio-label"><input type="radio" name="karten" value="36" checked>36</label>
        <label class="radio-label"><input type="radio" name="karten" value="48">48</label>
      </div>
    </div>
  </div>

  <!-- Handy-Querformat: kompakte Ein-Zeilen-Ansicht (nur per Media Query sichtbar) -->
  <div class="header-mobile" style="display:none; align-items:center; gap:6px; flex-wrap:nowrap; flex:1 1 auto; min-width:0;">
    <!-- Spielernamen-, CSV-, PDF- und Neue-Liste-Container werden per JS beim Wechsel hierher verschoben -->
    <div id="header-info" style="font-size:14px; color:#000; font-weight:bold; white-space:nowrap; margin-left:auto;">
      S:1 / T:1
    </div>
  </div>
</div>


<div id="spieler-buttons-container" style="margin-bottom:10px; display:flex; gap:10px;">
  <div id="player-btn-container-1"></div>
  <div id="player-btn-container-2"></div>
  <div id="player-btn-container-3"></div>
  <div id="player-btn-container-4"></div>
  <div id="csv-export-container"></div>
  <div id="pdf-export-container"></div>
  <div id="neu-start-container"></div>
</div>

<div class="table-wrapper" style="max-height:600px; overflow-y:auto; overflow-x:auto; width:100%; max-width:100%;">
  <table id="skat-table">
  <thead id="skat-thead">
  </thead>
  <tbody id="game-rows">
  </tbody>
  <tfoot id="skat-tfoot">
  </tfoot>
</table>
</div>

<dialog id="spiel-dialog" style="padding:20px; border-radius:8px; width:625px; max-width:90%; font-size:15px;">
  <form method="dialog" id="spiel-form" style="display:flex; flex-direction:column; gap:10px;">

<script>
let spielDaten = [];
let scale = 1.0;
let spielerAnzahl = 4;  // 3 oder 4 — zentrale Steuerung

function getSpielerAnzahl() {
  return parseInt(document.querySelector('input[name="spieleranzahl"]:checked')?.value || '4');
}

// Bonus-Multiplikator: 30 bei 4 Spielern, 40 bei 3 Spielern
function getBonusGMultiplikator() {
  return spielerAnzahl === 3 ? 40 : 30;
}

// ── Verein-Auswahl über URL ────────────────────────────────────────
// Primär (Query-Parameter, robust bei Weiterleitung):
//    …/index.html?club=boore     → "de vier Boore"
//    …/index.html?club=sinthern  → Sintherner Skatclub (explizit)
// Ebenfalls unterstützt (Hash):
//    …/index.html#devierboore    → "de vier Boore"
//    …/index.html#sinthern       → Sintherner Skatclub (explizit)
// Default (nichts angegeben):
//    …/index.html                → Sintherner Skatclub
// Der Boore-Homescreen-Einstieg über `devierboore.html` reicht den Modus
// per Query-Parameter weiter. Kein localStorage-Fallback: die plain-URL
// ist immer der Default (Sinthern).
function getVereinsMode() {
  try {
    const params = new URLSearchParams(window.location.search);
    const club = (params.get('club') || '').toLowerCase();
    if (club === 'boore' || club === 'devierboore') return '4buure';
    if (club === 'sinthern') return 'sinthern';
    const hash = (window.location.hash || '').replace(/^[#\/]+/, '').toLowerCase();
    if (hash === 'boore' || hash === 'devierboore') return '4buure';
    if (hash === 'sinthern') return 'sinthern';
  } catch {}
  return null; // = Sinthern-Default
}

// Wird als Filter-Gate an vielen Stellen aufgerufen – im neuen Modell
// ist ein Verein-Kontext immer bekannt (Default = Sinthern), daher true.
function isVereinParamActive() { return true; }

const kartenDefault = 36;
spielDaten = Array(kartenDefault).fill(null).map((_, i) => ({
  nr: i + 1,
  grundwert: "", hand: "", schneider: "", schwarz: "",
  schneiderang: "", schwarzang: "", offen: "",
  mitSpitzen: "", ohneSpitzen: "", spielwert: "",
  pluswert: "", minuswert: "",
  p1_punkte: "", p1_gew: "", p1_verl: "",
  p2_punkte: "", p2_gew: "", p2_verl: "",
  p3_punkte: "", p3_gew: "", p3_verl: "",
  p4_punkte: "", p4_gew: "", p4_verl: "",
  p1_delta: "", p2_delta: "", p3_delta: "", p4_delta: "",
  eingepasst: "",
  spieler: ""

// ── Tabelle dynamisch aufbauen (thead + tfoot) ─────────────────────
function buildTableStructure() {
  const thead = document.getElementById("skat-thead");
  const tfoot = document.getElementById("skat-tfoot");
  const n = spielerAnzahl;

  // THEAD
  let headerRow1 = `
    <tr>
      <th rowspan="2" class="vertical-left"><span>Lfd. Nr. Spiel</span></th>
      <th rowspan="2" class="unten">9 <br>10<br>11<br>12<br>23<br>24<br>E</th>
      <th rowspan="2" class="vertical-left"><span>mit Spitzen</span></th>
      <th rowspan="2" class="vertical-left"><span>ohne Spitzen</span></th>
      <th colspan="6">Gewinnstufen</th>
      <th colspan="2">Werte</th>`;
  for (let i = 1; i <= n; i++) {
    headerRow1 += `<th colspan="3" class="player-name${i} player-name">Name${i === 1 ? ' (LF)' : ''}</th>`;
  }
  headerRow1 += `<th rowspan="2" class="vertical-left"><span>Eingepasst</span></th><th></th></tr>`;

  let headerRow2 = `<tr>
      <th class="vertical-left"><span>Hand</span></th>
      <th class="vertical-left"><span>Schneider</span></th>
      <th class="vertical-left"><span>Schn. ang.</span></th>
      <th class="vertical-left"><span>Schwarz</span></th>
      <th class="vertical-left"><span>Schw. ang.</span></th>
      <th class="vertical-left"><span>Offen</span></th>
      <th class="spielwert-spalte">+</th>
      <th class="spielwert-spalte">-</th>`;
  for (let i = 1; i <= n; i++) {
    headerRow2 += `<th class="unten">Platz ${i}</th>

      <th class="vertical-left"><span>verloren</span></th>`;
  }
  headerRow2 += `<th></th></tr>`;

  thead.innerHTML = headerRow1 + headerRow2;

  // TFOOT
  const gMulti = getBonusGMultiplikator();
  let spielpunkteRow = `<tr><th colspan="12" style="text-align:left; padding: 0 15px;font-size: 14px; background:#f0f0f0; font-weight: 400;">Spielpunkte:</th>`;
  for (let i = 1; i <= n; i++) {
    spielpunkteRow += `<td class="rechts" id="sum-p${i}">0</td><td id="gew-p${i}">0</td><td id="verl-p${i}">0</td>`;
  }
  spielpunkteRow += `<td id="sum-eingepasst">0</td><td></td></tr>`;

  let bonusPRow = `<tr><th colspan="12" style="text-align:left; padding: 0 15px; font-size: 14px; background:#f0f0f0;font-weight: 400;">+ (gew. Spiele - verl. Spiele) x 50:</th>`;
  for (let i = 1; i <= n; i++) {
    bonusPRow += `<td class="rechts" id="bonus-p${i}">0</td><td id="bogew-p${i}"></td><td></td>`;
  }
  bonusPRow += `<td></td><td></td></tr>`;

  let bonusGRow = `<tr><th colspan="12" style="text-align:left; padding: 0 15px;font-size: 14px; background:#f0f0f0; font-weight: 400;">+ verl. Spiele der Gegenspieler x ${gMulti}:</th>`;
  for (let i = 1; i <= n; i++) {
    bonusGRow += `<td class="rechts" id="bonus-g${i}">0</td><td id="bogew-g${i}"></td><td></td>`;
  }
  bonusGRow += `<td></td><td></td></tr>`;

  let gesamtRow = `<tr><th colspan="12" style="text-align:left; padding: 0 15px;font-size: 14px; background:#f0f0f0; font-weight:bold;">Gesamtpunkte:</th>`;
  for (let i = 1; i <= n; i++) {
    gesamtRow += `<td class="rechts" id="gesamt-p${i}">0</td><td></td><td></td>`;
  }
  gesamtRow += `<td></td><td></td></tr>`;

  let abreizRow = `<tr id="abreizgeld-row"><th colspan="12" style="text-align:left; padding: 4px 15px; font-size: 14px; background:#f0f0f0; font-weight:400; vertical-align:middle; line-height:1.25;"><div>Abreizgeld: <b id="abreiz-summe">0,00 €</b></div><div id="abreiz-regel" style="font-size:11px; font-weight:400; color:#555; line-height:1.2; margin-top:2px;">(Eingepasst: je 0,50 €, Verlorene 1–3: je 0,50 €, ab 4: je 1,00 €)</div></th>`;
  for (let i = 1; i <= n; i++) {
    abreizRow += `<td class="rechts" id="abreiz-p${i}" colspan="3">0,00 €</td>`;
  }
  abreizRow += `<td></td><td></td></tr>`;

  tfoot.innerHTML = spielpunkteRow + bonusPRow + bonusGRow + gesamtRow + abreizRow;

  // Header-Beschriftungen (Handy-Kurzlabels) nach Neu-Aufbau wieder anwenden
  if (typeof _updateHeaderLabels === 'function') _updateHeaderLabels();
}

function isOldIOS() {
  const ua = navigator.userAgent;
  const match = ua.match(/OS (\d+)_/);
  return match && parseInt(match[1]) < 16;
}

function setStickyByScale(scale) {
  const tfoot = document.querySelector('#skat-table tfoot');
  // Sticky nur bei Zoom > 1 aktivieren (Tablet-Querformat).
  // Bei Scale < 1 (Handy-Querformat) bricht Sticky auf iPhone Safari durch die CSS-Transform.
  if (scale > 1.0 && !isOldIOS()) {
    tfoot.style.position = '-webkit-sticky';
    tfoot.style.position = 'sticky';
    tfoot.style.bottom = '0';
    tfoot.style.zIndex = '3';
  } else {
    tfoot.style.position = 'static';
    tfoot.style.bottom = '';
    tfoot.style.zIndex = '';
  }
}

function setTableHeight() {
  const swidth = screen.width;
  // visualViewport liefert auf Android Chrome den tatsaechlich sichtbaren Bereich
  // (nach Einklappen der URL-Leiste); iOS/Tablet verhalten sich identisch zum Fallback
  const vv = window.visualViewport;
  const screenH = vv ? vv.height : window.innerHeight;
  const screenW = vv ? vv.width  : window.innerWidth;
  const wrapper = document.querySelector('.table-wrapper');
  const isLandscape = screenW > screenH;

  let scale = 1.0;
  if (isLandscape) {
    if (screenW < 900) {
      const tableEl = document.querySelector('#skat-table');
      const naturalWidth = tableEl && tableEl.scrollWidth > 600 ? tableEl.scrollWidth : 800;
      scale = Math.min(1.0, screenW / naturalWidth);
    } else if (swidth >= 1200) {
      scale = 1.0;
    } else {
      scale = 1.35;
    }
  } else {
    if (screenW >= 810) scale = 1.0;
    else scale = screenW / 825;
  }

  let maxH;
  let maxW;
  // Handy-Querformat: kompakter Header, mehr Platz für die Tabelle.
  // Safe-Area-Insets (Notch/Home-Indicator) mit einrechnen, damit die
  // Tabelle nicht in den nicht antippbaren Bereich rutscht.
  const isPhoneLandscape = isLandscape && screenW < 900;
  if (isPhoneLandscape) {
    const safeTop    = _safeInset('top', 8);
    const safeBottom = _safeInset('bottom', 2);
    maxH = screenH - 90 - safeTop - safeBottom;
  }
  else if (isLandscape) { maxH = screenH - 210; }
  else { maxH = screenH - 175; }
  maxW = screenW + 100;
  maxH = maxH / scale;

  wrapper.style.maxHeight = maxH + 'px';
  // Handy-Querformat: Wrapper an Inhalt anpassen, damit kein leerer Bereich
  // unter der Tabelle entsteht wenn weniger Zeilen als maxHeight passen.
  wrapper.style.height = isPhoneLandscape ? 'auto' : (maxH + 'px');
}

// Safe-Area-Inset via CSS-Trick auslesen (iOS Notch/Home-Indicator).
// Legt kurzzeitig ein unsichtbares Element mit env()-Wert an und liest die Höhe/Breite ab.
function _safeInset(side, fallback) {
  try {
    const probe = document.createElement('div');
    probe.style.cssText =
      'position:fixed; visibility:hidden; ' +
      (side === 'top' || side === 'bottom'
        ? `height: env(safe-area-inset-${side}, ${fallback}px);`
        : `width: env(safe-area-inset-${side}, ${fallback}px);`);
    document.body.appendChild(probe);
    const px = (side === 'top' || side === 'bottom') ? probe.offsetHeight : probe.offsetWidth;
    document.body.removeChild(probe);
    return px || fallback;
  } catch (e) { return fallback; }
}

function resetZoom() {
  // Viewport-Zoom (Pinch-Zoom auf iOS Safari) zurücksetzen, indem das
  // viewport-Meta kurz "fest" gesetzt und dann wieder freigegeben wird
  const vp = document.querySelector('meta[name="viewport"]');
  if (vp) {
    const original = vp.getAttribute('content');
    vp.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
    setTimeout(() => {
      vp.setAttribute('content', original);
      autoScalePage();
    }, 150);
  }
  window.scrollTo(0, 0);
}

function autoScalePage() {
  const swidth = screen.width;
  const vv = window.visualViewport;
  const width  = vv ? vv.width  : window.innerWidth;
  const height = vv ? vv.height : window.innerHeight;
  const isLandscape = width > height;

  let scale = 1.0;
  if (isLandscape) {
    if (width < 900) {
      // Handy-Querformat: Tabelle auf volle Bildschirmbreite skalieren.
      // Nie über 1.0 hinaus, sonst wird die Tabelle größer als der Viewport.
      const tableEl = document.querySelector('#skat-table');
      const naturalWidth = tableEl && tableEl.scrollWidth > 600 ? tableEl.scrollWidth : 800;
      scale = Math.min(1.0, width / naturalWidth);
    } else if (swidth >= 1200) {
      scale = 1.0;
    } else {
      scale = 1.35;           // Tablet-Querformat
    }
  } else {
    if (width >= 810) scale = 1.0;
    else scale = width / 825;
  }

  const comp = 100 / scale;
  const html = document.documentElement;
  html.style.transform = `scale(${scale})`;
  html.style.transformOrigin = '0 0';
  html.style.width = comp + '%';
  html.style.height = comp + '%';
  html.style.overflow = 'hidden';

  setStickyByScale(scale);
  setTableHeight();
  updateCopyright();

  console.log(`Landscape: ${isLandscape}, Width: ${width}x${height}, Scale: ${scale.toFixed(2)}`);
}

window.addEventListener('load', autoScalePage);
window.addEventListener('resize', autoScalePage);
window.addEventListener('orientationchange', autoScalePage);
// Android Chrome: URL-Leiste ein-/ausklappen aendert die sichtbare Hoehe
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', autoScalePage);
}

// Doppel-Tipp-Zoom auf iOS Safari unterbinden (touch-action allein reicht nicht zuverlässig)
let _lastTouchEnd = 0;
document.addEventListener('touchend', function (e) {
  const now = Date.now();
  if (now - _lastTouchEnd <= 300) {
    e.preventDefault();
  }
  _lastTouchEnd = now;
}, { passive: false });
// Zusätzlich: gesture-Events von iOS Safari komplett blocken
document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
document.addEventListener('gestureend',   function (e) { e.preventDefault(); });

function fillTable() {
  const tbody = document.getElementById("game-rows");
  tbody.innerHTML = "";
  const n = spielerAnzahl;

  console.log("Test-Tabelle: " + spielDaten.length + " Zeilen, Spieler: " + n);

  let buttonInserted = false;

  let punkteSummen     = [0, 0, 0, 0];
  let gewinnZaehler    = [0, 0, 0, 0];
  let verlustZaehler   = [0, 0, 0, 0];
  let eingepasstZaehler = 0;

  spielDaten.forEach((data, i) => {
    const isEmpty = !data.grundwert && !data.hand && !data.schneider &&
                    !data.schneiderang && !data.schwarz && !data.schwarzang && !data.offen;

    if (isEmpty && !buttonInserted) {
      createButtonRow(i);
      buttonInserted = true;
    }

    let istEingepasst = false;
    let istGueltigesSpiel = false;

    if (!isEmpty) {
      if (data.grundwert === "E" || data.grundwert === "Pass") {
        istEingepasst = true;
        eingepasstZaehler++;
      }
      else if (data.spieler && data.gewonnen !== null && data.gewonnen !== undefined) {
        istGueltigesSpiel = true;
        const pos = data.spieler - 1;
        const delta = parseInt(data[`p${data.spieler}_delta`]) || 0;
        punkteSummen[pos] += delta;
        if (data.gewonnen === true) {
          gewinnZaehler[pos]++;
        } else if (data.gewonnen === false) {
          verlustZaehler[pos]++;
        }
      }
    }

    // Anzeigewerte
    let pPunkte = ["", "", "", ""];
    let pGew = ["", "", "", ""];
    let pVerl = ["", "", "", ""];
    let eingepasstAnzeige = "";

    if (!isEmpty) {
      if (istEingepasst) {
        eingepasstAnzeige = eingepasstZaehler;
      }
      if (istGueltigesSpiel && data.spieler) {
        const pos = data.spieler - 1;
        pPunkte[pos] = punkteSummen[pos];
        pGew[pos] = data.gewonnen === true ? gewinnZaehler[pos] : "";
        pVerl[pos] = data.gewonnen === false ? verlustZaehler[pos] : "";
      }
    }

    const row = document.createElement("tr");
    row.classList.add("data-row");
    row.dataset.nr = data.nr;

    if (istEingepasst) {
      row.style.backgroundColor = "#ddd";
      row.style.fontStyle = "italic";
    }

    const negFmt = v => (Number(v) < 0 ? `<span style="color:red;">${v}</span>` : v);
    let playerCols = "";
    for (let p = 0; p < n; p++) {
      playerCols += `<td class="rechts">${pPunkte[p] === "" || pPunkte[p] == null ? "" : negFmt(pPunkte[p])}</td><td>${pGew[p]}</td><td>${pVerl[p]}</td>`;
    }

    row.innerHTML = `
      <td>${data.nr}</td>
      <td>${data.grundwert || ""}</td>
      <td>${data.mitSpitzen || ""}</td>
      <td>${data.ohneSpitzen || ""}</td>
      <td>${data.hand || ""}</td>
      <td>${data.schneider || ""}</td>
      <td>${data.schneiderang || ""}</td>
      <td>${data.schwarz || ""}</td>
      <td>${data.schwarzang || ""}</td>
      <td>${data.offen || ""}</td>
      <td>${data.pluswert || ""}</td>
      <td>${data.minuswert ? `<span style="color:red;">${data.minuswert}</span>` : ""}</td>
      ${playerCols}
      <td>${eingepasstAnzeige}</td>
      <td>
        ${isEmpty ? "" : `<button class="edit-btn" onclick="openNewModal(${data.nr-1})">Edit</button>`}
      </td>
    `;

    // Streifen-Styling für Geber
    const colMap = n === 4 ? [13, 16, 19, 22] : [13, 16, 19];
    const mod = (data.nr - 1) % n;
    row.querySelector(`td:nth-child(${colMap[mod]})`).style.background = "repeating-linear-gradient(-45deg, #ddd, #ddd 3px, #fff 3px, #fff 6px)";
    row.querySelector(`td:nth-child(${colMap[mod]+1})`).style.background = "repeating-linear-gradient(-45deg, #ddd, #ddd 3px, #fff 3px, #fff 6px)";
    row.querySelector(`td:nth-child(${colMap[mod]+2})`).style.background = "repeating-linear-gradient(-45deg, #ddd, #ddd 3px, #fff 3px, #fff 6px)";

    tbody.appendChild(row);
  });

  const setNumColor = (el, v) => { el.style.color = Number(v) < 0 ? "red" : ""; };

  // Gesamtsummen in tfoot schreiben
  for (let i = 0; i < n; i++) {
    const sumVal = punkteSummen[i] || 0;
    const sumCell = document.getElementById(`sum-p${i+1}`);
    sumCell.textContent = sumVal;
    setNumColor(sumCell, sumVal);
    document.getElementById(`gew-p${i+1}`).textContent = gewinnZaehler[i] || 0;
    document.getElementById(`verl-p${i+1}`).textContent = verlustZaehler[i] || 0;
  }
  document.getElementById("sum-eingepasst").textContent = eingepasstZaehler || 0;

  // Bonus-Zeile: (gew - verl) × 50
  for (let i = 0; i < n; i++) {
    const bonusP = (gewinnZaehler[i] - verlustZaehler[i]) * 50;
    const diff = gewinnZaehler[i] - verlustZaehler[i];
    const bpCell = document.getElementById(`bonus-p${i+1}`);
    const bgCell = document.getElementById(`bogew-p${i+1}`);
    bpCell.textContent = bonusP || 0;
    bgCell.textContent = diff || 0;
    setNumColor(bpCell, bonusP);
    setNumColor(bgCell, diff);
  }

  // Bonus-Zeile: (verl Gegner) × Multiplikator
  const gMulti = getBonusGMultiplikator();
  for (let i = 0; i < n; i++) {
    let gegnerVerluste = 0;
    for (let j = 0; j < n; j++) {
      if (j !== i) gegnerVerluste += verlustZaehler[j];
    }
    const bonusG = gegnerVerluste * gMulti;
    document.getElementById(`bonus-g${i+1}`).textContent = bonusG || 0;
    document.getElementById(`bogew-g${i+1}`).textContent = gegnerVerluste || 0;
  }

  // Gesamtpunkte
  for (let i = 0; i < n; i++) {
    const bonusP = (gewinnZaehler[i] - verlustZaehler[i]) * 50;
    let gegnerVerluste = 0;
    for (let j = 0; j < n; j++) {
      if (j !== i) gegnerVerluste += verlustZaehler[j];
    }
    const bonusG = gegnerVerluste * gMulti;
    const gesamt = punkteSummen[i] + bonusP + bonusG;
    const cell = document.getElementById(`gesamt-p${i+1}`);
    cell.textContent = gesamt || 0;
    cell.style.color = gesamt > 0 ? "green" : gesamt < 0 ? "red" : "black";
    cell.style.fontWeight = "bold";
  }

  // Abreizgeld: 0,50 € pro Eingepasstem Spiel + Staffelung eigene Verluste (je nach Verein)
  //   Sinthern: 1–3 je 0,50 €, ab 4 je 1,00 €
  //   4 Buure:  1–2 je 0,50 €, 3–4 je 1,00 €, ab 5 je 2,00 €
  const vereinModeAbreiz = isVereinParamActive() ? getVereinsMode() : null;
  const abreizRow = document.getElementById("abreizgeld-row");
  const abreizRegelEl = document.getElementById("abreiz-regel");
  const istBuure = vereinModeAbreiz === '4buure';
  const berechneEigenVerlust = (verl) => istBuure
    ? Math.min(verl, 2) * 0.5
      + Math.min(Math.max(verl - 2, 0), 2) * 1
      + Math.min(Math.max(verl - 4, 0), 2) * 1.5
      + Math.max(verl - 6, 0) * 2
    : Math.min(verl, 3) * 0.5 + Math.max(0, verl - 3) * 1;
  if (abreizRegelEl) {
    abreizRegelEl.innerHTML = istBuure
      ? '(Eingepasst: je 0,50 €, Verlorene 1–2: je 0,50 €, 3–4: je 1,00 €, 5–6: je 1,50 €, ab 7: je 2,00 €)'
      : '(Eingepasst: je 0,50 €, Verlorene 1–3: je 0,50 €, ab 4: je 1,00 €)';
  }
  if (abreizRow) {
    abreizRow.style.display = "";
    let summe = 0;
    for (let i = 0; i < n; i++) {
      const verl = verlustZaehler[i] || 0;
      const betrag = eingepasstZaehler * 0.5 + berechneEigenVerlust(verl);
      summe += betrag;
      const cell = document.getElementById(`abreiz-p${i+1}`);
      if (cell) cell.textContent = betrag.toFixed(2).replace('.', ',') + ' €';
    }
    const summeEl = document.getElementById("abreiz-summe");
    if (summeEl) summeEl.textContent = summe.toFixed(2).replace('.', ',') + ' €';
  }

  updatePlayerNamesInTable();
  saveState();
}

function berechneSpielwert(spiel) {
    const grundwert = parseInt(spiel.grundwert) || 0;
    if (grundwert === 0 || grundwert === "E") return 0;

    // Null-Spiele
    if (grundwert === 23) {
        const hatHand   = spiel.hand === "X";
        const hatOuvert = spiel.offen === "X";
        if (hatHand && hatOuvert) return 59;
        if (hatHand)              return 35;
        if (hatOuvert)            return 46;
        return 23;
    }

    // Farb- und Grand-Spiele
    let multiplikator = 0;
    if (spiel.hand        === "X") multiplikator++;
    if (spiel.schneider   === "X") multiplikator++;
    if (spiel.schneiderang === "X") multiplikator++;
    if (spiel.schwarz     === "X") multiplikator++;
    if (spiel.schwarzang  === "X") multiplikator++;
    if (spiel.offen       === "X") multiplikator++;

    const spitzen = parseInt(spiel.mitSpitzen) || parseInt(spiel.ohneSpitzen) || 0;
    const spitzenFaktor = spitzen + 1;
    const spielwert = grundwert * (spitzenFaktor + multiplikator);
    return spielwert;
}

function setSpitzen(isMitSpitzen) {
  const mit = document.getElementById("mitSpitzen");
  const ohne = document.getElementById("ohneSpitzen");
  const grundwert = document.getElementById("grundwert")?.value || "";

  if (isMitSpitzen) {
    mit.value = mit.value || "1";
    ohne.value = "";
  } else {
    ohne.value = ohne.value || "1";
    mit.value = "";
  }

  if (grundwert === "Eingepasst" || grundwert === "E") {
    mit.value = "";
    ohne.value = "";
  }

  document.querySelectorAll(".spitzen-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll("#spitzen-buttons button")[isMitSpitzen ? 0 : 1].classList.add("active");

  const aktuelleAnzahl = isMitSpitzen ? parseInt(mit.value) || 1 : parseInt(ohne.value) || 1;
  document.querySelectorAll("#spitzen-anzahl .spitze-btn").forEach(btn => {
    btn.classList.toggle("active", parseInt(btn.textContent) === aktuelleAnzahl);
  });
}

function selectSpitze(value) {
  const mit = document.getElementById("mitSpitzen");
  const ohne = document.getElementById("ohneSpitzen");
  const toggles = document.querySelectorAll("#spitzen-buttons button");
  const istMit = toggles[0]?.classList.contains("active");

  if (istMit) {
    mit.value = value;
    ohne.value = "";
  } else {
    ohne.value = value;
    mit.value = "";
  }

  document.querySelectorAll(".spitze-btn").forEach(b => {
    b.classList.toggle("active", b.textContent == value);
  });
}

      });

      btn.style.background = "#4CAF50";
      btn.style.color = "#fff";

    });

  }
}

async function exportPDF() {
  // Spielernamen vollständig?
  for (let i = 0; i < spielerAnzahl; i++) {
    if (!spielerNamen[i] || spielerNamen[i] === `Spieler ${i+1}`) {
      alert(`⚠️ Bitte erst alle Spielernamen auswählen (Spieler ${i+1} fehlt)!`);
      return;
    }
  }
  // Serie komplett? → nur Hinweis, Export darf trotzdem laufen
  const gewaehlteSpielAnz = parseInt(document.querySelector('input[name="karten"]:checked')?.value) || 0;
  const eingetragen = spielDaten.slice(0, gewaehlteSpielAnz).filter(s => s.grundwert).length;
  if (gewaehlteSpielAnz > 0 && eingetragen < gewaehlteSpielAnz) {
    const weiter = confirm(
      `ℹ️ Hinweis: Die Liste ist noch nicht komplett (${eingetragen} von ${gewaehlteSpielAnz} Spielen eingetragen).\n\n` +
      `Trotzdem als PDF exportieren?`
    );
    if (!weiter) return;
  }
  if (typeof html2canvas === 'undefined' || !window.jspdf) {
    alert('⚠️ PDF-Bibliotheken noch nicht geladen — bitte kurz warten und erneut versuchen.');
    return;
  }

  const table = document.getElementById('skat-table');
  if (!table) return;

  const btn = document.getElementById('btn-pdf-export');
  const alterText = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '⏳ Erzeuge PDF…'; btn.disabled = true; }

  // Body-Skalierung (autoScalePage) temporär zurücksetzen, damit html2canvas sauber rendert
  const htmlEl = document.documentElement;
  const savedTransform = htmlEl.style.transform;
  const savedOrigin = htmlEl.style.transformOrigin;
  htmlEl.style.transform = '';
  htmlEl.style.transformOrigin = '';

  // Scrollposition des Tabellen-Wrappers zurücksetzen (Tablet: sonst
  // wird nur der aktuell sichtbare Ausschnitt sauber gerendert)
  const pdfWrapper = document.querySelector('.table-wrapper');
  const savedScrollTop  = pdfWrapper ? pdfWrapper.scrollTop  : 0;
  const savedScrollLeft = pdfWrapper ? pdfWrapper.scrollLeft : 0;
  const savedMaxHeight  = pdfWrapper ? pdfWrapper.style.maxHeight : '';
  const savedHeight     = pdfWrapper ? pdfWrapper.style.height    : '';
  const savedOverflow   = pdfWrapper ? pdfWrapper.style.overflow  : '';
  if (pdfWrapper) {
    pdfWrapper.scrollTop = 0;
    pdfWrapper.scrollLeft = 0;
    pdfWrapper.style.maxHeight = 'none';
    pdfWrapper.style.height    = 'auto';
    pdfWrapper.style.overflow  = 'visible';
  }

  // Handy-Kompakt-Header temporär auf Vollversion zurückschalten,
  // damit das PDF die vertikalen langen Beschriftungen zeigt.
  const wasCompactHeader = document.body.classList.contains('mobile-compact-header');
  if (wasCompactHeader) { _setHeaderStructure(false); _setHeaderLabels(false); }

  try {
    // Maße der vertikalen Header vorab aus dem echten DOM lesen –
    // im clonedDoc liefert getBoundingClientRect keine zuverlässigen Werte.
    const verticalThs = Array.from(table.querySelectorAll('.vertical-left'));
    const verticalInfo = verticalThs.map(th => {
      const r = th.getBoundingClientRect();
      const span = th.querySelector('span');
      return {
        w: r.width  || 18,
        h: r.height || 60,
        text: span ? span.textContent.trim() : ''
      };
    });

    const canvas = await html2canvas(table, {
      scale: 2,
      backgroundColor: '#ffffff',
      windowWidth: Math.max(table.scrollWidth, table.offsetWidth),
      windowHeight: Math.max(table.scrollHeight, table.offsetHeight),
      onclone: (clonedDoc, clonedEl) => {
        // Wrapper "entfesseln": max-height + overflow aufheben, damit die
        // komplette Liste gerendert wird (nicht nur der auf dem Tablet
        // sichtbare Scroll-Ausschnitt). Scrollposition zurücksetzen.
        const wrapper = clonedDoc.querySelector('.table-wrapper');
        if (wrapper) {
          wrapper.style.maxHeight = 'none';
          wrapper.style.height    = 'auto';
          wrapper.style.overflow  = 'visible';
          wrapper.scrollTop = 0;
          wrapper.scrollLeft = 0;
        }
        // thead: sticky aufheben, sonst rutscht der Kopf an die aktuelle
        // Scrollposition statt an den Tabellenanfang.
        clonedEl.querySelectorAll('thead th').forEach(th => {
          th.style.position = 'static';
          th.style.top = 'auto';
        });
        // "Neuer Spieleintrag"-Button-Zeile im PDF nicht mit ausgeben
        clonedEl.querySelectorAll('tr.button-row').forEach(r => r.remove());
        // Geber-Markierung im PDF: Schraffur (repeating-linear-gradient)
        // durch einen einfachen hellgrauen Hintergrund ersetzen.
        clonedEl.querySelectorAll('tbody td').forEach(td => {
          const bg = td.style.background || '';
          if (bg.indexOf('repeating-linear-gradient') !== -1) {
            td.style.background      = '';
            td.style.backgroundImage = 'none';
            td.style.backgroundColor = '#e5e5e5';
          }
        });
        // Eingepasst-Zeilen: grauen Hintergrund entfernen, stattdessen eine
        // horizontale Linie mittig durch die Zeile ziehen – aber nur von
        // Spalte 3 (mit Spitzen) bis zur letzten "verloren"-Spalte, also
        // ohne Lfd. Nr., Grundwert, Eingepasst und Edit-Spalte.
        // Geber-Zellen (bereits hellgrau) behalten ihre Färbung.
        clonedEl.querySelectorAll('tbody tr').forEach(tr => {
          const bg = (tr.style.backgroundColor || '').replace(/\s/g, '');
          const isEingepasst = bg === 'rgb(221,221,221)' || bg === '#ddd';
          if (!isEingepasst) return;
          tr.style.backgroundColor = 'transparent';
          tr.style.fontStyle = '';
          const cells = tr.querySelectorAll('td');
          const total = cells.length;
          cells.forEach((td, idx) => {
            const geberBg = (td.style.backgroundColor || '').replace(/\s/g, '');
            const istGeber = geberBg === 'rgb(229,229,229)' || geberBg === '#e5e5e5';
            td.style.backgroundColor = istGeber ? '#e5e5e5' : 'transparent';
            // Strike nur zwischen Spalte 3 (idx 2) und letzter "verloren"
            // (idx < total-2, weil Eingepasst + Edit ausgeschlossen bleiben)
            if (idx >= 2 && idx < total - 2) {
              td.style.backgroundImage    = 'linear-gradient(#000, #000)';
              td.style.backgroundRepeat   = 'no-repeat';
              td.style.backgroundPosition = '0 50%';
              td.style.backgroundSize     = '100% 1.2px';
            } else {
              td.style.backgroundImage = 'none';
            }
          });
        });
        // Letzte Spalte (Edit-Button / Leer-Spalte) im PDF entfernen,
        // damit "Eingepasst" die letzte Spalte ist.
        clonedEl.querySelectorAll('thead tr, tbody tr, tfoot tr').forEach(tr => {
          const cells = tr.children;
          if (cells.length > 0) tr.removeChild(cells[cells.length - 1]);
        });
        // html2canvas rendert `writing-mode: vertical-*` unzuverlässig →
        // vertikale Header per SVG mit rotiertem <text> ersetzen (pixelperfekt).
        const clonedThs = clonedEl.querySelectorAll('.vertical-left');
        clonedThs.forEach((th, idx) => {
          const info = verticalInfo[idx];
          if (!info || !info.text) return;
          const thW = Math.max(info.w, 14);
          const thH = Math.max(info.h, 40);
          const svgNS = 'http://www.w3.org/2000/svg';
          const svg = clonedDoc.createElementNS(svgNS, 'svg');
          svg.setAttribute('width',  thW);
          svg.setAttribute('height', thH);
          svg.setAttribute('viewBox', `0 0 ${thW} ${thH}`);
          svg.style.display = 'block';
          const txt = clonedDoc.createElementNS(svgNS, 'text');
          const cx = thW / 2;
          const cy = thH - 4;
          txt.setAttribute('x', cx);
          txt.setAttribute('y', cy);
          txt.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
          txt.setAttribute('text-anchor', 'start');
          txt.setAttribute('dominant-baseline', 'middle');
          txt.setAttribute('font-family', 'Arial, Helvetica, sans-serif');
          txt.setAttribute('font-size', '12');
          txt.setAttribute('fill', '#000');
          txt.textContent = info.text;
          svg.appendChild(txt);
          th.innerHTML = '';
          th.appendChild(svg);
          th.style.verticalAlign = 'bottom';
          th.style.textAlign = 'center';
          th.style.padding = '0';
        });
      }
    });

    const imgData = canvas.toDataURL('image/png');

    const pageW = pdf.internal.pageSize.getWidth();   // 210
    const pageH = pdf.internal.pageSize.getHeight();  // 297
    const marginX = 8;

    // Kopfzeile
    const datum = new Date().toLocaleDateString('de-DE');

    pdf.text(`Datum: ${datum}    Serie: ${serie}    Tisch: ${tisch}`, marginX, 16);
    pdf.text(`Spieler: ${spielerListe}`, marginX, 22);

    // Tabellen-Bild einbetten
    const imgTopY = 26;
    const availW = pageW - 2 * marginX;
    const availH = pageH - imgTopY - marginX;
    const imgRatio = canvas.width / canvas.height;
    let imgW = availW;
    let imgH = imgW / imgRatio;
    if (imgH > availH) { imgH = availH; imgW = imgH * imgRatio; }
    const imgX = marginX + (availW - imgW) / 2;
    pdf.addImage(imgData, 'PNG', imgX, imgTopY, imgW, imgH);

    const isoDatum = new Date().toISOString().split('T')[0];
    pdf.save(`Skatliste_${isoDatum}_S${serie}_T${tisch}.pdf`);
  } catch (e) {
    console.error('PDF-Export fehlgeschlagen:', e);
    alert('⚠️ PDF-Export fehlgeschlagen: ' + (e && e.message ? e.message : e));
  } finally {
    htmlEl.style.transform = savedTransform;
    htmlEl.style.transformOrigin = savedOrigin;
    if (pdfWrapper) {
      pdfWrapper.style.maxHeight = savedMaxHeight;
      pdfWrapper.style.height    = savedHeight;
      pdfWrapper.style.overflow  = savedOverflow;
      pdfWrapper.scrollTop  = savedScrollTop;
      pdfWrapper.scrollLeft = savedScrollLeft;
    }
    if (wasCompactHeader) { _setHeaderStructure(true); _setHeaderLabels(true); }
    if (btn) { btn.innerHTML = alterText; btn.disabled = false; }
  }
}

function exportCSV() {
  const n = spielerAnzahl;
  const gMulti = getBonusGMultiplikator();

  const headers = ['Nr','Grundwert','Mit','Ohne','Hand','Schneider','Schn.Ang','Schwarz','Schw.Ang','Offen','+', '-'];
  for (let i = 0; i < n; i++) {
    headers.push(spielerNamen[i], `Gew${i+1}`, `Verl${i+1}`);
  }
  headers.push('Eingepasst');

  const csvRows = [headers];

  spielDaten.forEach(spiel => {
    const row = [
      spiel.nr || '', spiel.grundwert || '', spiel.mitSpitzen || '', spiel.ohneSpitzen || '',
      spiel.hand || '', spiel.schneider || '', spiel.schneiderang || '', spiel.schwarz || '',
      spiel.schwarzang || '', spiel.offen || '', spiel.pluswert || '', spiel.minuswert || ''
    ];
    for (let i = 1; i <= n; i++) {
      row.push(spiel[`p${i}_delta`] || '', spiel[`p${i}_gew`] || '', spiel[`p${i}_verl`] || '');
    }
    row.push(spiel.eingepasst || '');
    csvRows.push(row);
  });

  // ENDSUMMEN
  const sumRow = ['','','','','','','','','','','',''];
  for (let i = 1; i <= n; i++) {
    sumRow.push(
      document.getElementById(`sum-p${i}`)?.textContent || '',
      document.getElementById(`gew-p${i}`)?.textContent || '',
      document.getElementById(`verl-p${i}`)?.textContent || ''
    );
  }
  sumRow.push(document.getElementById('sum-eingepasst')?.textContent || '');
  csvRows.push(sumRow);

  // Bonus-Berechnungen
  const bonusG = [], bonusP = [], gesamt = [];
  for (let i = 1; i <= n; i++) {
    let gv = 0;
    for (let j = 1; j <= n; j++) {
      if (j !== i) gv += getInt(`verl-p${j}`);
    }
    bonusG.push(gv);
    bonusP.push(getInt(`gew-p${i}`) - getInt(`verl-p${i}`));
    gesamt.push(getInt(`sum-p${i}`) + bonusP[i-1]*50 + gv*gMulti);
  }

  const bpRow = ['','','','','','','','','','','',''];
  for (let i = 0; i < n; i++) { bpRow.push(bonusP[i] * 50, bonusP[i], ''); }
  bpRow.push('');
  csvRows.push(bpRow);

  const bgRow = ['','','','','','','','','','','',''];
  for (let i = 0; i < n; i++) { bgRow.push(bonusG[i] * gMulti, bonusG[i], ''); }
  bgRow.push('');
  csvRows.push(bgRow);

  const gRow = ['','','','','','','','','','','',''];
  for (let i = 0; i < n; i++) { gRow.push(gesamt[i], '', ''); }
  gRow.push('');
  csvRows.push(gRow);

  // SEMIKOLON + UTF-8 BOM
  const csvContent = '\uFEFF' + csvRows.map(row =>
    row.map(cell => `"${cell}"`).join(';')
  ).join('\n');

  const serieWert = document.querySelector('input[name="serie"]:checked')?.value || '0';
  const tischWert = document.getElementById('tisch-auswahl')?.value || '0';

  downloadCSV(csvContent, `Spielliste_${n}er_S${serieWert}_T${tischWert}_${new Date().toLocaleDateString('de-DE')}.csv`);
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  if (link.download !== undefined) {
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", filename);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
}

async function loadNeuesteTurnierauslosung(serie) {
  try {
    const fs = window.__firestore;
    if (!fs || !fs.db || !fs.collection || !fs.query || !fs.where || !fs.getDocs) {
      console.warn("[Auslosung] Firestore-Query-APIs nicht verfügbar");
      return null;
    }
    // Kein orderBy in der Query → kein zusammengesetzter Firestore-Index nötig.
    // Sortierung + limit werden client-seitig gemacht.
    const q = fs.query(
      fs.collection(fs.db, "turnierauslosungen"),
      fs.where("serie", "==", String(serie))
    );
    const snap = await fs.getDocs(q);
    if (snap.empty) {
      console.warn(`[Auslosung] Keine Turnierauslosung für Serie ${serie} gefunden`);
      return null;
    }
    // Neuesten Eintrag über createdAt (Firestore-Timestamp) bestimmen
    const docs = snap.docs.map(d => d.data());
    docs.sort((a, b) => {
      const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a.createdAt?.seconds || 0) * 1000;
      const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b.createdAt?.seconds || 0) * 1000;
      return tb - ta;
    });
    console.log(`[Auslosung] ${docs.length} Eintrag/Einträge für Serie ${serie} geladen, neuester genommen`);
    return docs[0];
  } catch (e) {
    console.warn("[Auslosung] Konnte nicht geladen werden:", e);
    return null;
  }
}

function findeAuslosungTischEintrag(auslosung, tischNr) {
  if (!auslosung || !Array.isArray(auslosung.tische)) return null;
  const tischNum = Number(tischNr);
  const eintrag = auslosung.tische.find(t => Number(t.tisch) === tischNum);
  if (!eintrag || !Array.isArray(eintrag.spieler)) {
    console.warn(`[Auslosung] Kein Tisch ${tischNr} in Auslosung gefunden`);
    return null;
  }
  return {
    groesse: Number(eintrag.groesse) || eintrag.spieler.length,
    spieler: eintrag.spieler
  };
}

async function existsSpieltagFuerHeute() {
  try {
    const fs = window.__firestore;
    if (!fs || !fs.db || !fs.collection || !fs.query || !fs.where || !fs.getDocs) return false;
    const datum = new Date().toISOString().split('T')[0];
    const q = fs.query(
      fs.collection(fs.db, "spieltage"),
      fs.where("datum", "==", datum)
    );

    return !snap.empty;
  } catch (e) {
    console.warn("[Auslosung] Prüfung Speicherung heute fehlgeschlagen:", e);

  }
}

async function refreshTurnierauslosung() {
  const serie = document.querySelector('input[name="serie"]:checked')?.value || '1';
  const tisch = document.getElementById('tisch-auswahl')?.value || '1';
  const sondertag = isSpecialDay();
  const vereinMode = isVereinParamActive() ? getVereinsMode() : null;

  // "de 4 Buure": Setzliste nie laden (nur Sintherner Skatclub)
  if (vereinMode === '4buure') {
    console.log("[Auslosung] Buure-Modus – übersprungen");
    return;
  }

  // Normaler Tag: nur bei Serie 2 die neueste Auslosung übernehmen (still, keine Meldung wenn keine).
  // Sondertag: für beide Serien immer laden, mit Meldung falls nichts gefunden.
  const modusNormalSerie2 = !sondertag && serie === '2';
  if (!sondertag && !modusNormalSerie2) {
    console.log("[Auslosung] Kein Sondertag und nicht Serie 2 – übersprungen");
    return;
  }

  // Sintherner Skatclub (Nicht-Sondertag): nur laden, wenn heute bereits eine Speicherung vorliegt
  if (!sondertag) {
    const gibtEs = await existsSpieltagFuerHeute();
    if (!gibtEs) {
      console.log("[Auslosung] Keine Speicherung heute vorhanden – übersprungen");
      return;
    }
  }

  console.log(`[Auslosung] Serie=${serie}, Tisch=${tisch}, Modus=${sondertag ? 'Sondertag' : 'NormalSerie2'} → lade …`);
  const auslosung = await loadNeuesteTurnierauslosung(serie);
  if (!auslosung) {
    if (sondertag) showKurzMeldung(`Keine Auslosung für Serie ${serie} gefunden`);
    else console.log("[Auslosung] Keine Serie-2-Auslosung vorhanden – ignoriert");
    return;
  }

  const eintrag = findeAuslosungTischEintrag(auslosung, tisch);
  if (!eintrag) {
    if (sondertag) showKurzMeldung(`Keine Spieler für Serie ${serie} / Tisch ${tisch}`);
    else console.log(`[Auslosung] Tisch ${tisch} nicht in neuester Serie-2-Auslosung – ignoriert`);
    return;
  }

  const zielGroesse = (eintrag.groesse === 3 || eintrag.groesse === 4) ? eintrag.groesse : spielerAnzahl;
  const groesseAendert = zielGroesse !== spielerAnzahl;

  // Namen setzen
  let namenAendern = false;
  for (let i = 0; i < zielGroesse; i++) {
    const neu = eintrag.spieler[i] || `Spieler ${i + 1}`;
    if (spielerNamen[i] !== neu) {
      spielerNamen[i] = neu;
      namenAendern = true;
    }
  }
  // Restliche Slots auf Default zurücksetzen (falls von 4 → 3 gewechselt wird)
  for (let i = zielGroesse; i < 4; i++) {
    const def = `Spieler ${i + 1}`;
    if (spielerNamen[i] !== def) {
      spielerNamen[i] = def;
      namenAendern = true;
    }
  }

  if (groesseAendert) {
    console.log(`[Auslosung] Spielerzahl wechselt: ${spielerAnzahl} → ${zielGroesse}`);
    spielerAnzahl = zielGroesse;
    const spRadio = document.querySelector(`input[name="spieleranzahl"][value="${zielGroesse}"]`);
    if (spRadio) spRadio.checked = true;
    buildTableStructure();
    updateKartenAuswahl();
    fillTable();
    generatePlayerNameButtons();
    updateCopyright();
    saveState();
    console.log(`[Auslosung] Namen für Tisch ${tisch} (${zielGroesse}er) gesetzt:`, spielerNamen.slice(0, zielGroesse));
  } else if (namenAendern) {
    console.log(`[Auslosung] Namen für Tisch ${tisch} übernommen:`, spielerNamen.slice(0, zielGroesse));
    generatePlayerNameButtons();
    if (typeof updatePlayerNamesInTable === 'function') updatePlayerNamesInTable();
    saveState();
  } else {
    console.log(`[Auslosung] Keine Änderung nötig`);
  }
}

function generatePlayerNameButtons() {

    if (!container) continue;

    container.innerHTML = "";

    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = spielerNamen[pos - 1] || `Spieler ${pos}`;
    btn.style.fontSize = "15px";
    btn.style.padding = "6px 12px";
    btn.style.cursor = "pointer";

    btn.style.borderRadius = "6px";

    btn.addEventListener("click", () => {
      const select = document.createElement("select");
      select.style.fontSize = "15px";
      select.style.padding = "4px 8px";
      select.style.minWidth = "180px";
      select.style.maxWidth = "220px";
      select.style.marginTop = "4px";

      const optDefault = document.createElement("option");
      optDefault.value = "";
      optDefault.text = "— Namen wählen —";
      select.appendChild(optDefault);

      const aktuell = spielerNamen[pos - 1];
      const listeAktuell = getAktuelleMitspielerListe();
      listeAktuell.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.text = name === "Gast" ? "Gast (Name eingeben)" : name;
        if (name === aktuell) opt.selected = true;
        select.appendChild(opt);
      });

      const gastInput = document.createElement("input");
      gastInput.type = "text";
      gastInput.id = `gast-input-${pos}`;
      gastInput.placeholder = "Gastname eingeben...";
      gastInput.style.display = "none";
      gastInput.style.marginTop = "4px";
      gastInput.style.padding = "4px 8px";
      gastInput.style.width = "200px";

      const restoreButton = () => {
        if (select.parentNode) container.removeChild(select);
        if (gastInput.parentNode) container.removeChild(gastInput);
        if (!container.contains(btn)) container.appendChild(btn);
      };

      select.addEventListener("change", () => {
        const wert = select.value;
        if (wert === "Gast") {
          gastInput.style.display = "block";
          gastInput.focus();
          return;
        } else if (gastInput.style.display === "block") {
          gastInput.style.display = "none";
        }

        if (wert && wert !== "Gast") {
          // Duplikat-Prüfung
          const andererIndex = spielerNamen.findIndex((n, idx) => idx !== (pos - 1) && n === wert);
          if (andererIndex >= 0) {
            alert(`⚠️ "${wert}" ist bereits als Spieler ${andererIndex + 1} eingetragen!`);
            select.value = "";
            return;
          }
          spielerNamen[pos - 1] = wert;
          btn.textContent = wert;
          updatePlayerNamesInTable();
          saveState();
        }
        restoreButton();
      });

      gastInput.addEventListener("change", () => {
        const gastName = gastInput.value.trim();
        if (gastName) {
          // Duplikat-Prüfung auch für Gast-Namen
          const andererIndex = spielerNamen.findIndex((n, idx) => idx !== (pos - 1) && n === gastName);
          if (andererIndex >= 0) {
            alert(`⚠️ "${gastName}" ist bereits als Spieler ${andererIndex + 1} eingetragen!`);
            gastInput.value = "";
            gastInput.focus();
            return;
          }
          spielerNamen[pos - 1] = gastName;
          btn.textContent = gastName;
          updatePlayerNamesInTable();
          saveState();
        }
        restoreButton();
      });

      select.addEventListener("blur", () => {
        setTimeout(() => {
          if (document.activeElement === gastInput) return;
          if (select.parentNode) restoreButton();
        }, 150);
      });

      gastInput.addEventListener("blur", () => {
        setTimeout(() => {
          if (document.activeElement === select) return;
          if (gastInput.parentNode || select.parentNode) restoreButton();
        }, 150);
      });

      container.removeChild(btn);
      container.appendChild(select);
      container.appendChild(gastInput);
      select.focus();
    });

    container.appendChild(btn);
  }
}

      data[key] = data[key] === "X" ? "" : "X";
      btn.classList.toggle("active");

	  // Schwarz angesagt
	  if (label === "Schw.ang.") {
		if (data.schwarzang === "X" && data.schwarz !== "X") {
		  data.schwarz = "X";
		  const setBtn = Array.from(container.children).find(b => b.innerHTML.includes("Schwarz"));
		  if (setBtn) {setBtn.classList.add("active");}
		}
		if (data.schwarzang === "X" && data.schneiderang !== "X") {
		  data.schneiderang = "X";
		  const setBtn = Array.from(container.children).find(b => b.innerHTML.includes("Schn."));
		  if (setBtn) {setBtn.classList.add("active");}
		}
		if (data.schwarzang === "X" && data.schneider !== "X") {
		  data.schneider = "X";
		  const setBtn = Array.from(container.children).find(b => b.innerHTML.includes("Schneider"));
		  if (setBtn) {setBtn.classList.add("active");}
		}
		if (data.schwarzang === "X" && data.hand !== "X") {
		  data.hand = "X";
		  const setBtn = Array.from(container.children).find(b => b.innerHTML.includes("Hand"));
		  if (setBtn) {setBtn.classList.add("active");}
		}
	  }

	  // Schwarz
	  if (label === "Schwarz") {
		if (data.schwarz === "X" && data.schneider !== "X") {
		  data.schneider = "X";
		  const setBtn = Array.from(container.children).find(b => b.innerHTML.includes("Schneider"));
		  if (setBtn) {setBtn.classList.add("active");}
		}
	  }

	  // Schneider angesagt
	  if (label === "Schn.ang.") {
		if (data.schneiderang === "X" && data.schneider !== "X") {
		  data.schneider = "X";
		  const setBtn = Array.from(container.children).find(b => b.innerHTML.includes("Schneider"));
		  if (setBtn) {setBtn.classList.add("active");}
		}
		if (data.schneiderang === "X" && data.hand !== "X") {
		  data.hand = "X";
		  const setBtn = Array.from(container.children).find(b => b.innerHTML.includes("Hand"));
		  if (setBtn) {setBtn.classList.add("active");}
		}
	  }

      fillTable();
    });

    container.appendChild(btn);
  });
}

function resetButtons() {
  document.querySelectorAll("#grundwert-buttons button").forEach(btn => {
    btn.style.backgroundColor = "";
    btn.style.fontWeight = "";
    if (btn.textContent === "♥" || btn.textContent === "♦") {
      btn.style.color = "red";
    } else {
      btn.style.color = "black";
    }
  });

  document.getElementById("spitzen-buttons").style.display = "none";
  document.getElementById("spitzen-anzahl").style.display = "none";
  document.querySelectorAll(".spitzen-btn").forEach(btn => btn.classList.remove("active"));
  document.querySelectorAll(".spitze-btn").forEach(btn => btn.classList.remove("active"));
}

function renderSpitzenButtons(max) {
  const container = document.getElementById("spitzen-anzahl");
  container.innerHTML = "";
  container.style.display = "flex";

  for (let i = 1; i <= max; i++) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "spitze-btn";
    btn.textContent = i;
    btn.onclick = () => selectSpitze(i);
    container.appendChild(btn);
  }
}

function setGrundwert(value) {
  const input = document.getElementById("grundwert");
  const spitzenBlock = document.getElementById("spitzen-buttons");
  const spitzenAnzahlBlock = document.getElementById("spitzen-anzahl");
  const gewinnstufenBlock = document.getElementById("gewinnstufen-buttons");

  const grundwertMap = {
    "Grand": 24, "♣": 12, "♠": 11, "♥": 10, "♦": 9, "Null": 23, "Pass": "E"
  };

  input.value = grundwertMap[value];

  if (value === "Null" || value === "Pass") {
    spitzenBlock.style.display = "none";
    spitzenAnzahlBlock.style.display = "none";
    document.getElementById("mitSpitzen").value = "";
    document.getElementById("ohneSpitzen").value = "";
    document.querySelectorAll(".spitzen-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".spitze-btn").forEach(b => b.classList.remove("active"));
  } else {
    spitzenBlock.style.display = "flex";
    spitzenAnzahlBlock.style.display = "flex";
    if (value === "Grand") {
      renderSpitzenButtons(4);
    } else {
      renderSpitzenButtons(11);
    }
  }

  gewinnstufenBlock.innerHTML = "";
  const currentIndex = getCurrentSpielIndex();
  if (currentIndex >= 0) {
    generateGewinnstufenButtons(currentIndex);
  }

  const buttonsUI = document.querySelectorAll("#grundwert-buttons button");
  buttonsUI.forEach(btn => {
    let baseColor = "black";
    if (btn.textContent === "♥" || btn.textContent === "♦") baseColor = "red";

    if (btn.textContent === value) {
      btn.style.backgroundColor = "#4CAF50";
      btn.style.color = "white";
      btn.style.fontWeight = "bold";
    } else {
      btn.style.backgroundColor = "";
      btn.style.color = baseColor;
      btn.style.fontWeight = "";
    }
  });
}

function getCurrentSpielIndex() {
  const idx = parseInt(document.getElementById("spiel-form").dataset.spielIndex, 10);
  return isNaN(idx) ? -1 : idx;
}

function openNewModal(spielIndex = null) {
  const dialog = document.getElementById("spiel-dialog");
  const spielNummerSpan = document.getElementById("spielnummer-display");
  const spieleAnz = document.querySelector('input[name="karten"]:checked')?.value || '0';

  const isPhoneLandscape = window.innerWidth > window.innerHeight && window.innerHeight <= 500;
  if (isPhoneLandscape) {
    // Handy-Querformat: Dialog auf native Größe, CSS-Media-Query macht ihn kompakt
    dialog.style.transform = '';
  } else {
    dialog.style.transform = `scale(${scale*0.9})`;
    dialog.style.transformOrigin = 'top center';
  }

  resetButtons();
  document.getElementById("grundwert").value = "";
  document.getElementById("mitSpitzen").value = "";
  document.getElementById("ohneSpitzen").value = "";

  if (spielIndex !== null && spielIndex >= 0) {
    const spiel = spielDaten[spielIndex];
    document.getElementById("grundwert").value = spiel.grundwert || "";
    document.getElementById("mitSpitzen").value = spiel.mitSpitzen || "";
    document.getElementById("ohneSpitzen").value = spiel.ohneSpitzen || "";
    document.getElementById("spiel-form").dataset.spielIndex = spielIndex;
    document.getElementById("spiel-form").dataset.ausgewaehlterSpieler = spiel.spieler || "";

    generatePlayerButtons(spielIndex);
    generateGewinnstufenButtons(spielIndex);
    spielNummerSpan.textContent = spiel.nr + ' / '+spieleAnz;

    const grundwertMapReverse = {
      "24": "Grand", "12": "♣", "11": "♠", "10": "♥", "9": "♦", "23": "Null", "E": "Pass"
    };
    const selectedText = grundwertMapReverse[spiel.grundwert];
    if (selectedText) {
      setGrundwert(selectedText);
    }
    const mitSpitzenVal  = parseInt(spiel.mitSpitzen) || 0;
    const ohneSpitzenVal = parseInt(spiel.ohneSpitzen) || 0;

    if (mitSpitzenVal > 0) {
        setSpitzen(true);
        document.querySelectorAll('#spitzen-anzahl .spitze-btn')
            .forEach(btn => {
                btn.classList.toggle('active', btn.textContent == mitSpitzenVal);
            });
    } else if (ohneSpitzenVal > 0) {
        setSpitzen(false);
        document.querySelectorAll('#spitzen-anzahl .spitze-btn')
            .forEach(btn => {
                btn.classList.toggle('active', btn.textContent == ohneSpitzenVal);
            });
    } else {
        document.querySelectorAll(".spitzen-btn").forEach(b => b.classList.remove("active"));
        document.getElementById("spitzen-anzahl").style.display = "none";
    }
  } else {
    const emptyIndex = spielDaten.findIndex(s =>
      !s.grundwert && !s.hand && !s.schneider && !s.schneiderang &&
      !s.schwarz && !s.schwarzang && !s.offen
    );
    const idx = emptyIndex >= 0 ? emptyIndex : spielDaten.length - 1;

    const s = spielDaten[idx];
    s.grundwert = "";
    s.hand = "";
    s.schneider = "";
    s.schneiderang = "";
    s.schwarz = "";
    s.schwarzang = "";
    s.offen = "";
    s.mitSpitzen = "";
    s.ohneSpitzen = "";
    s.spieler = "";

    document.getElementById("spiel-form").dataset.spielIndex = idx;
    document.getElementById("spiel-form").dataset.ausgewaehlterSpieler = "";

    generatePlayerButtons(idx);
    document.getElementById("gewinnstufen-buttons").innerHTML = "";

    spielNummerSpan.textContent = idx + 1;
  }

  const geberIdx = parseInt(document.getElementById("spiel-form").dataset.spielIndex, 10);
  const geberName = spielerNamen[geberIdx % spielerAnzahl];
  document.getElementById("kartengeber-display").textContent = "(Geber: " + geberName + ")";

  const loeschBtn = document.getElementById("btn-loeschen");
  if (loeschBtn) {
    let letzterGefuellt = -1;
    for (let i = spielDaten.length - 1; i >= 0; i--) {
      if (spielDaten[i].grundwert) { letzterGefuellt = i; break; }
    }
    const zeige = (geberIdx === letzterGefuellt && letzterGefuellt >= 0);
    loeschBtn.style.display = zeige ? "" : "none";
    ["btn-gewonnen", "btn-verloren", "btn-eingepasst", "btn-loeschen"].forEach(id => {
      const b = document.getElementById(id);
      if (!b) return;
      if (zeige) {
        b.style.textAlign = "center";
        b.style.minWidth = "0";
        b.style.padding = "16px 8px";
        b.style.flex = "1 1 0";
      } else {
        b.style.textAlign = "";
        b.style.minWidth = "150px";
        b.style.padding = "16px 40px";
        b.style.flex = "";
      }
    });
  }

  dialog.showModal();
}
