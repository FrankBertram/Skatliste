<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Live-Rangliste — 1. Sintherner Skatclub</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { color-scheme: light; }
    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      margin: 0; padding: 20px;
      background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
      color: #fff;
      min-height: 100vh;
    }
    h1 { text-align: center; margin: 0 0 8px; font-size: 28px; }
    .subline { text-align:center; opacity:0.85; margin-bottom:22px; font-size: 16px; }
    .container { max-width: 1100px; margin: 0 auto; }
    table {
      border-collapse: collapse; width: 100%;
      background: #fff; color: #222;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4); border-radius: 10px; overflow: hidden;
    }
    th, td {
      padding: 10px 12px; border-bottom: 1px solid #e0e0e0;
      text-align: right; font-size: 17px;
    }
    thead th {
      background: #303f9f; color: #fff; font-weight: bold; text-align: center;
      border-bottom: 2px solid #1a237e;
    }
    thead tr.sub th { background: #5c6bc0; font-size: 14px; padding: 6px 8px; }
    td.name { text-align: left; font-weight: bold; }
    td.platz { text-align: center; font-weight: bold; font-size: 20px; }
    td.tag { font-weight: bold; background: #f5f7ff; }
    tr:nth-child(even) td { background: #fafafa; }
    tr:nth-child(even) td.tag { background: #eef1ff; }
    tr.p1 td.platz { color: #d4af37; }
    tr.p2 td.platz { color: #9e9e9e; }
    tr.p3 td.platz { color: #b06835; }
    .status { text-align:center; margin-top:20px; font-size:14px; opacity:0.85; }
    .fehler { color:#ffab00; text-align:center; margin-top:20px; font-weight:bold; }
    .keine-daten { text-align:center; padding:40px; color:#666; font-style: italic; }
    @media (max-width: 640px) {
      body { padding: 10px; }
      h1 { font-size: 22px; }
      th, td { padding: 6px 6px; font-size: 14px; }
      td.platz { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tagesrangliste — 1. Sintherner Skatclub</h1>
    <div class="subline" id="datum-anzeige">…</div>
    <table id="rangliste">
      <thead>
        <tr>
          <th rowspan="2">Platz</th>
          <th rowspan="2">Name</th>
          <th colspan="2">Serie 1</th>
          <th colspan="2">Serie 2</th>
          <th rowspan="2">Tages­summe</th>
        </tr>
        <tr class="sub">
          <th>Punkte</th><th>Spiele</th>
          <th>Punkte</th><th>Spiele</th>
        </tr>
      </thead>
      <tbody id="rangliste-body">
        <tr><td colspan="7" class="keine-daten">Lade…</td></tr>
      </tbody>
    </table>
    <div class="status" id="status"></div>
    <div class="fehler" id="fehler"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot }
      from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmiQvDu0pxQYoidaZfRVY0BXZjLOHhw7w",
      authDomain: "skatverein-b77ef.firebaseapp.com",
      projectId: "skatverein-b77ef",
      storageBucket: "skatverein-b77ef.firebasestorage.app",
      messagingSenderId: "763387283518",
      appId: "1:763387283518:web:9edf27d79876cf2059296f"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const heute = new Date().toISOString().split('T')[0];
    document.getElementById('datum-anzeige').textContent =
      new Date().toLocaleDateString('de-DE',
        { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    const tischeState = new Map();  // docId -> data
    const q = query(collection(db, "spieltage_live"), where("datum", "==", heute));

    onSnapshot(q, snapshot => {
      snapshot.docChanges().forEach(ch => {
        if (ch.type === 'removed') tischeState.delete(ch.doc.id);
        else tischeState.set(ch.doc.id, ch.doc.data());
      });
      render();
    }, err => {
      document.getElementById('fehler').textContent =
        'Fehler beim Live-Sync: ' + (err.message || err.code || err);
    });

    function render() {
      // Aggregation je Spieler-Name über alle Tische, getrennt nach Serie
      const spielerMap = new Map();  // name -> { s1: {punkte, spiele}, s2: {...} }
      let tischeCount = 0;

      tischeState.forEach(docData => {
        tischeCount++;
        const n         = docData.spielerAnzahl || 4;
        const serieKey  = docData.serie === 2 ? 's2' : 's1';
        const gMulti    = (n === 3) ? 40 : 30;
        const spielerArr = docData.spieler || [];
        const spiele     = docData.spiele  || {};

        const spielpunkte = new Array(n).fill(0);
        const gew         = new Array(n).fill(0);
        const verl        = new Array(n).fill(0);
        const spieleAnz   = new Array(n).fill(0);

        Object.keys(spiele).forEach(k => {
          const idx = parseInt(k, 10);
          const s   = spiele[k];
          if (!s || !s.grundwert) return;

          // Anzahl Spiele: bei 4er zählen nur Spiele, in denen der Spieler nicht Geber ist
          for (let p = 0; p < n; p++) {
            const istGeber = (n === 4) && ((idx % 4) === p);
            if (!istGeber) spieleAnz[p]++;
          }

          if (s.spieler != null && s.spieler >= 1 && s.spieler <= n) {
            const sIdx = s.spieler - 1;
            spielpunkte[sIdx] += Number(s.pluswert || 0) + Number(s.minuswert || 0);
            if (s.gewonnen === true)  gew[sIdx]++;
            if (s.gewonnen === false) verl[sIdx]++;
          }
        });

        // Bonus + Gesamtpunkte pro Slot
        const totalVerl = verl.reduce((a,b) => a+b, 0);
        for (let p = 0; p < n; p++) {
          const bonusP = (gew[p] - verl[p]) * 50;
          const bonusG = (totalVerl - verl[p]) * gMulti;
          const gesamt = spielpunkte[p] + bonusP + bonusG;
          const name = spielerArr[p];
          if (!name) continue;
          if (!spielerMap.has(name)) spielerMap.set(name, { s1: null, s2: null });
          spielerMap.get(name)[serieKey] = { punkte: gesamt, spiele: spieleAnz[p] };
        }
      });

      const rows = [];
      spielerMap.forEach((v, name) => {
        const s1p = v.s1 ? v.s1.punkte : 0;
        const s2p = v.s2 ? v.s2.punkte : 0;
        rows.push({
          name,
          s1p, s2p,
          s1s: v.s1 ? v.s1.spiele : 0,
          s2s: v.s2 ? v.s2.spiele : 0,
          tag: s1p + s2p,
          hasS1: !!v.s1, hasS2: !!v.s2
        });
      });
      // absteigend nach Tagessumme
      rows.sort((a,b) => b.tag - a.tag);

      const tbody = document.getElementById('rangliste-body');
      tbody.innerHTML = '';

      if (rows.length === 0) {
        tbody.innerHTML =
          `<tr><td colspan="7" class="keine-daten">Noch keine Live-Daten für heute.</td></tr>`;
      } else {
        // Platzierung mit Ties (gleiche Tagessumme → gleicher Platz)
        let platz = 0, lastTag = null;
        rows.forEach((r, i) => {
          if (r.tag !== lastTag) { platz = i + 1; lastTag = r.tag; }
          const tr = document.createElement('tr');
          if (platz <= 3) tr.classList.add('p' + platz);
          tr.innerHTML =
            `<td class="platz">${platz}</td>` +
            `<td class="name">${escapeHtml(r.name)}</td>` +
            `<td>${r.hasS1 ? fmt(r.s1p) : '–'}</td>` +
            `<td>${r.hasS1 ? r.s1s   : '–'}</td>` +
            `<td>${r.hasS2 ? fmt(r.s2p) : '–'}</td>` +
            `<td>${r.hasS2 ? r.s2s   : '–'}</td>` +
            `<td class="tag">${fmt(r.tag)}</td>`;
          tbody.appendChild(tr);
        });
      }

      const zeit = new Date().toLocaleTimeString('de-DE',
        { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('status').textContent =
        `${tischeCount} Tisch${tischeCount === 1 ? '' : 'e'} live · Stand ${zeit}`;
    }

    function fmt(n) { return (n > 0 ? '+' : '') + n; }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g,
        c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
  </script>
</body>
</html>
